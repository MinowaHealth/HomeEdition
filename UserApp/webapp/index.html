<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minowa.ai</title>
    <link rel="stylesheet" href="shared/bundle.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Pinned to Babel 8.0.0. Do NOT use the unversioned URL: it tracks the npm 'latest'
         tag, which silently rolled to the 8.x major and changed in-browser transform behavior. -->
    <script src="https://unpkg.com/@babel/standalone@8.0.0/babel.min.js"></script>
    <!-- Babel 8 changes two defaults that break this no-bundler, UMD-globals page:
         (1) it no longer auto-applies the React preset, so JSX must be named explicitly via
             data-presets on the text/babel script below; and
         (2) preset-react now defaults to the 'automatic' JSX runtime, which emits imports from
             'react/jsx-runtime' that cannot resolve against the global React UMD loaded above.
         Register a 'react-classic' preset that pins runtime:'classic' (React.createElement output). -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [[Babel.availablePresets.react, { runtime: 'classic' }]]
        });
    </script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect } = React;

        // Use current host for API calls (works on any server)
        const API_BASE = `${window.location.protocol}//${window.location.host}/api/v1`;

        // Wrapper for fetch that handles 401 responses by redirecting to login
        const apiFetch = async (url, options = {}) => {
            const response = await fetch(url, options);
            if (response.status === 401) {
                // Session expired - redirect to login
                console.log('Session expired (401), redirecting to login');
                window.location.href = '/login';
                throw new Error('Session expired');
            }
            return response;
        };

        // Check session validity on page load and when tab becomes visible
        const checkSession = async () => {
            try {
                const res = await fetch(`${API_BASE}/session`);
                if (res.status === 401) {
                    window.location.href = '/login';
                }
            } catch (err) {
                console.log('Session check failed:', err);
            }
        };

        // Check session when page becomes visible (user switches back to tab)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                checkSession();
            }
        });

        // Theme: default to dark, respect saved preference
        const savedTheme = localStorage.getItem('hb-theme') || 'dark';
        if (savedTheme === 'dark') {
            document.body.classList.add('theme-dark');
        }
        window.setTheme = (theme) => {
            document.body.classList.remove('theme-dark', 'theme-light');
            if (theme === 'dark' || theme === 'light') {
                document.body.classList.add('theme-' + theme);
            }
            localStorage.setItem('hb-theme', theme);
        };

        // Activity bar size: sm | md | lg | xl (default lg)
        const savedActbarSize = localStorage.getItem('hb-actbar-size') || 'lg';
        document.body.setAttribute('data-actbar-size', savedActbarSize);
        window.setActbarSize = (size) => {
            document.body.setAttribute('data-actbar-size', size);
            localStorage.setItem('hb-actbar-size', size);
        };

        // Utility function to get current time in Pacific Time for datetime-local input
        const getPacificTimeString = (date = new Date()) => {
            // Convert to Pacific Time
            const pacificTime = new Date(date.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
            // Format for datetime-local input (YYYY-MM-DDTHH:mm)
            const year = pacificTime.getFullYear();
            const month = String(pacificTime.getMonth() + 1).padStart(2, '0');
            const day = String(pacificTime.getDate()).padStart(2, '0');
            const hours = String(pacificTime.getHours()).padStart(2, '0');
            const minutes = String(pacificTime.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        };

        // ==================== ACTIVITY BAR SVG ICONS ====================
        // Lucide-style 20x20 stroke-based icons matching ProviderApp
        const icons = {
            logging: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>,
            analysis: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
            observations: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            documents: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            config: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>,
            logout: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        };

        // ==================== ACTIVITY → VIEW MAPPING ====================
        // Each activity defines its default view and sidebar nav items
        const activityConfig = {
            logging:       { label: 'Logging',       defaultView: 'logging',       sidebar: null },
            analysis:      { label: 'Analysis',      defaultView: 'your-week',     sidebar: [
                { key: 'your-week',     label: 'Your Week' },
                { key: 'test-results',  label: 'Test Results' },
                { key: 'stress-bp',     label: 'Stress & BP' },
                { key: 'sleep',         label: 'Sleep Analysis' },
            ]},
            observations:  { label: 'Observations',  defaultView: 'observations',  sidebar: [
                { key: 'observations',  label: 'Observations' },
                { key: 'feedback',      label: 'Feedback' },
            ]},
            documents:     { label: 'Documents',     defaultView: 'documents',     sidebar: null },
            config:        { label: 'Configuration', defaultView: 'meals',         sidebar: [
                { key: 'meals',            label: 'Meals' },
                { key: 'stacks',           label: 'Stacks' },
                { key: 'food-items',       label: 'Food Items' },
                { key: 'health-inputs',    label: 'Health Inputs' },
                { key: 'timeframes',       label: 'Timeframes' },
                { key: 'healthkit-upload', label: 'HealthKit Upload' },
                { key: 'garmin-sync',      label: 'Garmin Sync' },
                { key: 'diagnostics',      label: 'Diagnostics' },
                { key: 'account',          label: 'Account' },
            ]},
        };

        function App() {
            const [activity, setActivity] = useState('logging');
            const [view, setView] = useState('logging');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [username, setUsername] = useState('');

            // Fetch current user info
            useEffect(() => {
                fetch(`${API_BASE}/session`)
                    .then(res => res.json())
                    .then(data => setUsername(data.username || ''))
                    .catch(err => console.log('Could not fetch session'));
            }, []);

            // Keyboard shortcut: Ctrl+B toggles sidebar
            useEffect(() => {
                const handler = (e) => {
                    if (e.ctrlKey && e.key === 'b') {
                        e.preventDefault();
                        setSidebarOpen(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);

            // Switch activity and set default view
            const switchActivity = (act) => {
                if (act === 'logout') {
                    window.location.href = '/logout';
                    return;
                }
                const cfg = activityConfig[act];
                setActivity(act);
                setView(cfg.defaultView);
                // Auto-open sidebar if activity has sidebar nav
                if (cfg.sidebar && !sidebarOpen) setSidebarOpen(true);
            };

            const cfg = activityConfig[activity];
            const hasSidebar = cfg && cfg.sidebar;

            return (
                <div className={`workbench${sidebarOpen && hasSidebar ? '' : ' sidebar-collapsed'}`}>
                    {/* ===== ACTIVITY BAR ===== */}
                    <nav className="activity-bar">
                        {Object.keys(activityConfig).map(act => (
                            <button key={act}
                                className={`act-icon${activity === act ? ' active' : ''}`}
                                title={activityConfig[act].label}
                                onClick={() => switchActivity(act)}>
                                {icons[act]}
                            </button>
                        ))}
                        <div className="act-spacer" />
                        <button className="act-icon" title="Logout" onClick={() => { window.location.href = '/logout'; }}
                            style={{ marginBottom: '8px' }}>
                            {icons.logout}
                        </button>
                    </nav>

                    {/* ===== SIDE BAR ===== */}
                    <aside className="side-bar">
                        {hasSidebar && (
                            <>
                                <div className="side-bar-header">
                                    <span>{cfg.label}</span>
                                    <button className="collapse-btn"
                                        onClick={() => setSidebarOpen(false)}
                                        title="Collapse sidebar (Ctrl+B)">
                                        &laquo;
                                    </button>
                                </div>
                                <div className="side-bar-content">
                                    {cfg.sidebar.map(item => (
                                        <button key={item.key}
                                            className={`sb-nav-item${view === item.key ? ' active' : ''}`}
                                            onClick={() => setView(item.key)}>
                                            {item.label}
                                        </button>
                                    ))}
                                </div>
                            </>
                        )}
                        {!hasSidebar && sidebarOpen && (
                            <div className="side-bar-header">
                                <span>{cfg.label}</span>
                            </div>
                        )}
                    </aside>

                    {/* ===== EDITOR AREA ===== */}
                    <div className="editor-area">
                        {view === 'logging' && <LoggingManager />}
                        {view === 'observations' && <ObservationsManager />}
                        {view === 'feedback' && <FeedbackManager />}
                        {view === 'documents' && <DocumentsManager />}
                        {view === 'meals' && <MealsManager />}
                        {view === 'stacks' && <StacksManager />}
                        {view === 'food-items' && <FoodItemsManager />}
                        {view === 'health-inputs' && <HealthInputsManager />}
                        {view === 'timeframes' && <TimeframesManager />}
                        {view === 'healthkit-upload' && <HealthKitUploadManager />}
                        {view === 'garmin-sync' && <GarminSyncManager userEmail={username} />}
                        {view === 'diagnostics' && <DiagnosticsManager />}
                        {view === 'account' && <AccountManager />}
                        {view === 'test-results' && <TestResultsAnalysis />}
                        {view === 'stress-bp' && <StressBPAnalysis />}
                        {view === 'sleep' && <SleepAnalysis />}
                        {view === 'your-week' && <YourWeekDashboard />}
                    </div>

                    {/* ===== STATUS BAR ===== */}
                    <div className="status-bar">
                        <span className="status-item">{username || 'Minowa.ai'}</span>
                        <span className="status-spacer" />
                        <span className="status-item">{activity !== 'logging' ? cfg.label : 'Ready'}</span>
                    </div>
                </div>
            );
        }

        // ==================== FOOD ITEMS ====================

        function FoodItemsManager() {
            const [items, setItems] = useState([]);
            const [editing, setEditing] = useState(null);
            const [formData, setFormData] = useState({
                name: '', brand: '', barcode: '', calories: '', protein_g: '',
                carbs_total_g: '', serving_size: '', serving_unit: '',
                is_vegan: 0, is_keto: 0, is_halal: 0
            });

            useEffect(() => {
                fetchItems();
            }, []);

            const fetchItems = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/food-items?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setItems(all);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const url = editing ? `${API_BASE}/food-items/${editing}` : `${API_BASE}/food-items`;
                const method = editing ? 'PUT' : 'POST';

                await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                resetForm();
                fetchItems();
            };

            const handleEdit = (item) => {
                setEditing(item.id);
                setFormData(item);
            };

            const handleDelete = async (id) => {
                await fetch(`${API_BASE}/food-items/${id}`, { method: 'DELETE' });
                fetchItems();
            };

            const resetForm = () => {
                setEditing(null);
                setFormData({
                    name: '', brand: '', barcode: '', calories: '', protein_g: '',
                    carbs_total_g: '', serving_size: '', serving_unit: '',
                    is_vegan: 0, is_keto: 0, is_halal: 0
                });
            };

            return (
                <div className="manager">
                    <h2>Food Items</h2>

                    <form onSubmit={handleSubmit} className="form">
                        <div className="form-row">
                            <input
                                type="text"
                                placeholder="Name *"
                                value={formData.name}
                                onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                required
                            />
                            <input
                                type="text"
                                placeholder="Brand"
                                value={formData.brand || ''}
                                onChange={(e) => setFormData({ ...formData, brand: e.target.value })}
                            />
                            <input
                                type="text"
                                placeholder="Barcode"
                                value={formData.barcode || ''}
                                onChange={(e) => setFormData({ ...formData, barcode: e.target.value })}
                            />
                        </div>

                        <div className="form-row">
                            <input
                                type="number"
                                step="0.1"
                                placeholder="Calories"
                                value={formData.calories || ''}
                                onChange={(e) => setFormData({ ...formData, calories: e.target.value })}
                            />
                            <input
                                type="number"
                                step="0.1"
                                placeholder="Protein (g)"
                                value={formData.protein_g || ''}
                                onChange={(e) => setFormData({ ...formData, protein_g: e.target.value })}
                            />
                            <input
                                type="number"
                                step="0.1"
                                placeholder="Carbs (g)"
                                value={formData.carbs_total_g || ''}
                                onChange={(e) => setFormData({ ...formData, carbs_total_g: e.target.value })}
                            />
                        </div>

                        <div className="form-row">
                            <input
                                type="number"
                                step="0.1"
                                placeholder="Serving Size"
                                value={formData.serving_size || ''}
                                onChange={(e) => setFormData({ ...formData, serving_size: e.target.value })}
                            />
                            <select
                                value={formData.serving_unit || ''}
                                onChange={(e) => setFormData({ ...formData, serving_unit: e.target.value })}
                            >
                                <option value="">Select Unit</option>
                                <option value="g">Grams (g)</option>
                                <option value="ml">Milliliters (ml)</option>
                                <option value="oz">Ounces (oz)</option>
                                <option value="tsp">Teaspoon (tsp)</option>
                                <option value="tbsp">Tablespoon (tbsp)</option>
                                <option value="cup_quarter">1/4 Cup</option>
                                <option value="cup_half">1/2 Cup</option>
                                <option value="cup">Cup</option>
                            </select>
                        </div>

                        <div className="form-row">
                            <label>
                                <input
                                    type="checkbox"
                                    checked={formData.is_vegan === 1}
                                    onChange={(e) => setFormData({ ...formData, is_vegan: e.target.checked ? 1 : 0 })}
                                />
                                Vegan
                            </label>
                            <label>
                                <input
                                    type="checkbox"
                                    checked={formData.is_keto === 1}
                                    onChange={(e) => setFormData({ ...formData, is_keto: e.target.checked ? 1 : 0 })}
                                />
                                Keto
                            </label>
                            <label>
                                <input
                                    type="checkbox"
                                    checked={formData.is_halal === 1}
                                    onChange={(e) => setFormData({ ...formData, is_halal: e.target.checked ? 1 : 0 })}
                                />
                                Halal
                            </label>
                        </div>

                        <div className="form-actions">
                            <button type="submit">{editing ? 'Update' : 'Create'} Food Item</button>
                            {editing && <button type="button" onClick={resetForm}>Cancel</button>}
                        </div>
                    </form>

                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Brand</th>
                                <th>Calories</th>
                                <th>Protein</th>
                                <th>Carbs</th>
                                <th>Tags</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {items.map(item => (
                                <tr key={item.id}>
                                    <td>{item.name}</td>
                                    <td>{item.brand || '-'}</td>
                                    <td>{item.calories || '-'}</td>
                                    <td>{item.protein_g || '-'}g</td>
                                    <td>{item.carbs_total_g || '-'}g</td>
                                    <td>
                                        {item.is_vegan ? '🌱' : ''}
                                        {item.is_keto ? '🥑' : ''}
                                        {item.is_halal ? '☪️' : ''}
                                    </td>
                                    <td>
                                        <button onClick={() => handleEdit(item)}>Edit</button>
                                        <button onClick={() => handleDelete(item.id)}>Delete</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        // ==================== MEALS ====================

        function MealsManager() {
            const [meals, setMeals] = useState([]);
            const [foodItems, setFoodItems] = useState([]);
            const [editing, setEditing] = useState(null);
            const [formData, setFormData] = useState({
                name: '', description: '', is_template: 0, items: []
            });

            useEffect(() => {
                fetchMeals();
                fetchFoodItems();
            }, []);

            const fetchMeals = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/meals?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setMeals(all);
            };

            const fetchFoodItems = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/food-items?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setFoodItems(all);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const url = editing ? `${API_BASE}/meals/${editing}` : `${API_BASE}/meals`;
                const method = editing ? 'PUT' : 'POST';

                // Filter out incomplete items (those without food_item_id selected)
                const validItems = formData.items.filter(item => item.food_item_id);

                await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...formData,
                        items: validItems
                    })
                });

                // Only reset form if creating new, stay in edit mode if editing
                if (!editing) {
                    resetForm();
                }
                fetchMeals();
            };

            const handleEdit = (meal) => {
                setEditing(meal.id);
                setFormData({
                    name: meal.name,
                    description: meal.description || '',
                    is_template: meal.is_template,
                    items: meal.items.map(item => ({
                        food_item_id: item.food_item_id,
                        quantity: item.quantity
                    }))
                });
            };

            const handleDelete = async (id) => {
                await fetch(`${API_BASE}/meals/${id}`, { method: 'DELETE' });
                fetchMeals();
            };

            const addMealItem = () => {
                setFormData({
                    ...formData,
                    items: [...formData.items, { food_item_id: '', quantity: 1 }]
                });
            };

            const updateMealItem = (index, field, value) => {
                const newItems = [...formData.items];
                newItems[index][field] = value;
                setFormData({ ...formData, items: newItems });
            };

            const adjustQuantity = (index, delta) => {
                const newItems = [...formData.items];
                newItems[index].quantity = Math.max(0.1, parseFloat(newItems[index].quantity || 0) + delta);
                setFormData({ ...formData, items: newItems });
            };

            const removeMealItem = (index) => {
                const newItems = formData.items.filter((_, i) => i !== index);
                setFormData({ ...formData, items: newItems });
            };

            const resetForm = () => {
                setEditing(null);
                setFormData({ name: '', description: '', is_template: 0, items: [] });
            };

            return (
                <div className="manager">
                    <h2>Meals</h2>

                    <form onSubmit={handleSubmit} className="form">
                        <div className="form-row">
                            <input
                                type="text"
                                placeholder="Meal Name *"
                                value={formData.name}
                                onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                required
                            />
                            <input
                                type="text"
                                placeholder="Description"
                                value={formData.description}
                                onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                            />
                        </div>

                        <div className="form-row">
                            <label>
                                <input
                                    type="checkbox"
                                    checked={formData.is_template === 1}
                                    onChange={(e) => setFormData({ ...formData, is_template: e.target.checked ? 1 : 0 })}
                                />
                                Template
                            </label>
                        </div>

                        <h3>Meal Items</h3>
                        {formData.items.map((item, index) => (
                            <div key={index} className="form-row quantity-row">
                                <select
                                    value={item.food_item_id}
                                    onChange={(e) => updateMealItem(index, 'food_item_id', e.target.value)}
                                >
                                    <option value="">Select Food Item</option>
                                    {foodItems.map(fi => (
                                        <option key={fi.id} value={fi.id}>{fi.name}</option>
                                    ))}
                                </select>
                                <div className="quantity-control">
                                    <button type="button" onClick={() => adjustQuantity(index, -0.5)}>−</button>
                                    <input
                                        type="number"
                                        step="0.1"
                                        placeholder="Qty"
                                        value={item.quantity}
                                        onChange={(e) => updateMealItem(index, 'quantity', e.target.value)}
                                        required
                                    />
                                    <button type="button" onClick={() => adjustQuantity(index, 0.5)}>+</button>
                                </div>
                                <button type="button" onClick={() => removeMealItem(index)}>Remove</button>
                            </div>
                        ))}

                        <button type="button" onClick={addMealItem}>Add Food Item</button>

                        <div className="form-actions">
                            <button type="submit">{editing ? 'Update' : 'Create'} Meal</button>
                            {editing && <button type="button" onClick={resetForm}>Cancel</button>}
                        </div>
                    </form>

                setFormData({ ...formData, inputs: newInputs });

                                    <input

        // ==================== HEALTHKIT UPLOAD ====================

        function HealthKitUploadManager() {
            const [uploading, setUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [currentJob, setCurrentJob] = useState(null);
            const [recentJobs, setRecentJobs] = useState([]);
            const [message, setMessage] = useState('');
            const [error, setError] = useState('');

            useEffect(() => {
                fetchRecentJobs();
                // Poll for job updates every 5 seconds if there's an active job
                const interval = setInterval(() => {
                    if (currentJob && (currentJob.status === 'queued' || currentJob.status === 'processing')) {
                        checkJobStatus(currentJob.job_id);
                    }
                }, 5000);
                return () => clearInterval(interval);
            }, [currentJob]);

            const fetchRecentJobs = async () => {
                try {
                    const response = await fetch(`${API_BASE}/healthkit/jobs`);
                    if (response.ok) {
                        const data = await response.json();
                        setRecentJobs(data.entries || []);
                    }
                } catch (err) {
                    console.error('Failed to fetch jobs:', err);
                }
            };

            const checkJobStatus = async (jobId) => {
                try {
                    const response = await fetch(`${API_BASE}/healthkit/jobs/${jobId}`);
                    if (response.ok) {
                        const job = await response.json();
                        setCurrentJob(job);

                        if (job.status === 'completed') {
                            setMessage(`✅ Import completed! Imported ${job.records_imported || 0} records, ${job.lab_results_imported || 0} lab results.`);
                            setError('');
                            fetchRecentJobs();
                        } else if (job.status === 'failed') {
                            setError(`❌ Import failed: ${job.error_message || 'Unknown error'}`);
                            setMessage('');
                            fetchRecentJobs();
                        }
                    }
                } catch (err) {
                    console.error('Failed to check job status:', err);
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Validate file type
                if (!file.name.endsWith('.zip')) {
                    setError('Please select a ZIP file');
                    return;
                }

                // Validate file size (max 500MB)
                const maxSize = 500 * 1024 * 1024;
                if (file.size > maxSize) {
                    setError('File too large (max 500MB)');
                    return;
                }

                setUploading(true);
                setError('');
                setMessage('Uploading...');
                setUploadProgress(0);

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const xhr = new XMLHttpRequest();

                    // Track upload progress
                    xhr.upload.addEventListener('progress', (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            setUploadProgress(percent);
                            if (percent === 100) {
                                setMessage('📤 Upload complete! Processing file...');
                            } else {
                                setMessage(`📤 Uploading... ${percent}%`);
                            }
                        }
                    });

                    // Handle completion
                    xhr.addEventListener('load', () => {
                        if (xhr.status === 202) {
                            const response = JSON.parse(xhr.responseText);
                            setMessage(`✅ File received! Import job queued (${response.job_id.substring(0, 16)}...)`);
                            setCurrentJob(response);
                            setUploadProgress(0); // Reset progress bar
                            // Start polling for status
                            setTimeout(() => checkJobStatus(response.job_id), 2000);
                        } else {
                            const response = JSON.parse(xhr.responseText);
                            setError(`Upload failed: ${response.error || 'Unknown error'}`);
                            setMessage('');
                        }
                        setUploading(false);
                    });

                    // Handle errors
                    xhr.addEventListener('error', () => {
                        setError('Upload failed: Network error');
                        setUploading(false);
                    });

                    xhr.open('POST', `${API_BASE}/healthkit/upload`);
                    xhr.send(formData);

                } catch (err) {
                    setError(`Upload failed: ${err.message}`);
                    setUploading(false);
                }

                // Reset file input
                e.target.value = '';
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return date.toLocaleString();
            };

            const getStatusBadge = (status) => {
                const badges = {
                    'queued': { text: '⏳ Queued', color: 'var(--color-muted)' },
                    'processing': { text: '⚙️ Processing', color: 'var(--color-accent)' },
                    'completed': { text: '✅ Completed', color: 'var(--color-success)' },
                    'failed': { text: '❌ Failed', color: 'var(--color-error)' }
                };
                const badge = badges[status] || { text: status, color: 'var(--color-muted)' };
                return (
                    <span style={{
                        background: badge.color,
                        color: 'white',
                        padding: '4px 8px',
                        borderRadius: '4px',
                        fontSize: '12px',
                        fontWeight: 'bold'
                    }}>
                        {badge.text}
                    </span>
                );
            };

        function GarminSyncManager({ userEmail = '' }) {
            const [status, setStatus] = useState(null);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [connecting, setConnecting] = useState(false);
            const [recentJobs, setRecentJobs] = useState([]);
            const [error, setError] = useState(null);
            const [message, setMessage] = useState(null);

            // Connection form - pre-populate with user's login email (can be changed)
            const [email, setEmail] = useState(userEmail);
            const [password, setPassword] = useState('');

            // Update email if userEmail prop changes (e.g., on initial load)
            useEffect(() => {
                if (userEmail && !email) {
                    setEmail(userEmail);
                }
            }, [userEmail]);

            // Current job polling
            const [currentJobId, setCurrentJobId] = useState(null);

            const fetchStatus = async () => {
                try {
                    const res = await fetch('/api/v1/garmin/status');
                    const data = await res.json();
                    setStatus(data);
                    setError(null);
                } catch (err) {
                    setError('Failed to fetch Garmin status');
                } finally {
                    setLoading(false);
                }
            };

            const fetchJobs = async () => {
                try {
                    const res = await fetch('/api/v1/garmin/jobs');
                    const data = await res.json();
                    setRecentJobs(data.entries || []);
                } catch (err) {
                    console.error('Failed to fetch jobs:', err);
                }
            };

            useEffect(() => {
                fetchStatus();
                fetchJobs();
            }, []);

            // Poll for current job status
            useEffect(() => {
                if (!currentJobId) return;

                const interval = setInterval(async () => {
                    try {
                        const res = await fetch(`/api/v1/garmin/jobs/${currentJobId}`);
                        const job = await res.json();

                        if (job.status === 'completed' || job.status === 'failed') {
                            setCurrentJobId(null);
                            setSyncing(false);
                            fetchStatus();
                            fetchJobs();

                            if (job.status === 'completed') {
                                setMessage(`Sync completed! Imported ${job.daily_summaries_imported || 0} daily summaries, ${job.sleep_records_imported || 0} sleep records.`);
                            } else {
                                setError(`Sync failed: ${job.error_message || 'Unknown error'}`);
                            }
                        }
                    } catch (err) {
                        console.error('Failed to poll job status:', err);
                    }
                }, 3000);

                return () => clearInterval(interval);
            }, [currentJobId]);

            const handleConnect = async (e) => {
                e.preventDefault();
                setConnecting(true);
                setError(null);
                setMessage(null);

                try {
                    const res = await fetch('/api/v1/garmin/connect', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        setMessage('Connected to Garmin successfully!');
                        setEmail('');
                        setPassword('');
                        fetchStatus();
                    } else {
                        setError(data.error || 'Connection failed');
                    }
                } catch (err) {
                    setError('Failed to connect: ' + err.message);
                } finally {
                    setConnecting(false);
                }
            };

            const handleDisconnect = async () => {
                if (!confirm('Disconnect from Garmin? You will need to re-enter your credentials to sync again.')) {
                    return;
                }

                try {
                    await fetch('/api/v1/garmin/disconnect', { method: 'POST' });
                    setMessage('Disconnected from Garmin');
                    fetchStatus();
                } catch (err) {
                    setError('Failed to disconnect');
                }
            };

            const handleSync = async () => {
                setSyncing(true);
                setError(null);
                setMessage(null);

                try {
                    const res = await fetch('/api/v1/garmin/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });

                    const data = await res.json();

                    if (res.ok) {
                        setCurrentJobId(data.job_id);
                        setMessage(`Sync started! Fetching data from ${data.sync_from} to ${data.sync_to}...`);
                        fetchJobs();
                    } else {
                        setError(data.error || 'Sync failed to start');
                        setSyncing(false);
                    }
                } catch (err) {
                    setError('Failed to start sync: ' + err.message);
                    setSyncing(false);
                }
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                return new Date(dateStr).toLocaleString();
            };

            const getStatusBadge = (jobStatus) => {
                const colors = {
                    queued: { bg: 'var(--color-warning)', text: 'var(--color-bg)' },
                    processing: { bg: 'var(--color-accent)', text: '#fff' },
                    completed: { bg: 'var(--color-success)', text: '#fff' },
                    failed: { bg: 'var(--color-error)', text: '#fff' }
                };
                const style = colors[jobStatus] || { bg: 'var(--color-muted)', text: '#fff' };
                return (
                    <span style={{
                        background: style.bg,
                        color: style.text,
                        padding: '2px 8px',
                        borderRadius: '4px',
                        fontSize: '12px',
                        fontWeight: 'bold'
                    }}>
                        {jobStatus}
                    </span>
                );
            };

            if (loading) {
                return <div>Loading Garmin status...</div>;
            }

            return (
                <div>
                    <h2>🏃 Garmin Sync</h2>
                    <p style={{ color: 'var(--color-muted)' }}>
                        Connect your Garmin account to sync fitness data automatically.
                    </p>

                    {error && (
                        <div style={{
                            padding: '12px',
                            background: 'var(--color-error-bg)',
                            border: '1px solid var(--color-error-border)',
                            borderRadius: '4px',
                            color: 'var(--color-error)',
                            marginBottom: '15px'
                        }}>
                            ❌ {error}
                        </div>
                    )}

                    {message && (
                        <div style={{
                            padding: '12px',
                            background: 'var(--color-success-bg)',
                            border: '1px solid #c3e6cb',
                            borderRadius: '4px',
                            color: 'var(--color-success)',
                            marginBottom: '15px'
                        }}>
                            ✓ {message}
                        </div>
                    )}

                    {/* Connection Status Section */}
                    <div style={{
                        background: 'var(--color-card)',
                        padding: '20px',
                        borderRadius: '8px',
                        marginBottom: '20px',
                        border: '1px solid var(--color-border)'
                    }}>
                        <h3 style={{ marginTop: 0 }}>Connection Status</h3>

                        {status?.connected ? (
                            <div>
                                <div style={{ marginBottom: '15px' }}>
                                    <span style={{
                                        background: 'var(--color-success)',
                                        color: 'white',
                                        padding: '4px 12px',
                                        borderRadius: '4px',
                                        fontWeight: 'bold'
                                    }}>
                                        ✓ Connected
                                    </span>
                                </div>
                                <p><strong>Email:</strong> {status.email}</p>
                                {status.display_name && <p><strong>Display Name:</strong> {status.display_name}</p>}
                                <p><strong>Last Sync:</strong> {status.last_sync_at ? formatDate(status.last_sync_at) : 'Never'}</p>

                                <div style={{ marginTop: '15px', display: 'flex', gap: '10px' }}>
                                    <button
                                        onClick={handleSync}
                                        disabled={syncing}
                                        style={{
                                            background: syncing ? 'var(--color-muted)' : 'var(--color-accent)',
                                            color: 'white',
                                            padding: '10px 20px',
                                            border: 'none',
                                            borderRadius: '4px',
                                            cursor: syncing ? 'not-allowed' : 'pointer',
                                            fontWeight: 'bold'
                                        }}

                                        {syncing ? '⏳ Syncing...' : '🔄 Sync Now'}

                                    <button

                                            background: 'var(--color-error)',
                                            color: 'white',
                                            padding: '10px 20px',
                                            border: 'none',
                                            borderRadius: '4px',
                                            cursor: 'pointer'
                                        }}
                                    >
                                        Disconnect
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div>
                                <div style={{ marginBottom: '15px' }}>
                                    <span style={{
                                        background: 'var(--color-muted)',
                                        color: 'white',
                                        padding: '4px 12px',
                                        borderRadius: '4px'
                                    }}>
                                        Not Connected
                                    </span>

                                <form onSubmit={handleConnect}>
                                    <div style={{ marginBottom: '10px' }}>
                                        <label style={{ display: 'block', marginBottom: '5px', fontWeight: 'bold' }}>
                                            Garmin Email:
                                        </label>
                                        <input
                                            type="email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            placeholder="Your Garmin email (may differ from login)"
                                            required
                                            style={{
                                                width: '300px',
                                                padding: '8px',
                                                borderRadius: '4px',
                                                border: '1px solid #ced4da'
                                            }}
                                        />
                                        <p style={{ fontSize: '12px', color: 'var(--color-muted)', marginTop: '5px' }}>
                                            Pre-filled with your login email. Change if your Garmin account uses a different email.
                                        </p>
                                    </div>
                                    <div style={{ marginBottom: '15px' }}>
                                        <label style={{ display: 'block', marginBottom: '5px', fontWeight: 'bold' }}>
                                            Garmin Password:
                                        </label>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="Enter your password"
                                            required
                                            style={{
                                                width: '300px',
                                                padding: '8px',
                                                borderRadius: '4px',
                                                border: '1px solid #ced4da'
                                            }}
                                        />
                                        <p style={{ fontSize: '12px', color: 'var(--color-muted)', marginTop: '5px' }}>
                                            Your password is used only to obtain an authentication token and is never stored.
                                        </p>
                                    </div>
                                    <button
                                        type="submit"
                                        disabled={connecting}
                                        style={{
                                            background: connecting ? 'var(--color-muted)' : 'var(--color-success)',
                                            color: 'white',
                                            padding: '10px 20px',
                                            border: 'none',
                                            borderRadius: '4px',
                                            cursor: connecting ? 'not-allowed' : 'pointer',

                                        }}

                    </div>

                    {/* Recent Sync Jobs */}
                    <h3>Recent Syncs</h3>

                                        <td>{getStatusBadge(job.status)}</td>
                                        <td>{job.sync_from_date} → {job.sync_to_date}</td>

        function AccountManager() {

            const [message, setMessage] = useState(null);

            const [mcpLoading, setMcpLoading] = useState(true);
            const [mcpError, setMcpError] = useState(null);
            const [copied, setCopied] = useState(null);

            // API Keys state
            const [apiKeys, setApiKeys] = useState([]);
            const [apiKeysLoading, setApiKeysLoading] = useState(true);
            const [newKeyLabel, setNewKeyLabel] = useState('MCP');
            const [newKeyResult, setNewKeyResult] = useState(null); // { key: "hbk_..." } shown once
            const [apiKeyError, setApiKeyError] = useState(null);
            const [apiKeyCreating, setApiKeyCreating] = useState(false);

            // 2FA state
            const [twoFaStatus, setTwoFaStatus] = useState(null);
            const [twoFaLoading, setTwoFaLoading] = useState(true);
            const [twoFaSetup, setTwoFaSetup] = useState(null); // { secret, uri }
            const [twoFaCode, setTwoFaCode] = useState('');
            const [backupCodes, setBackupCodes] = useState(null);
            const [twoFaError, setTwoFaError] = useState(null);
            const [twoFaMessage, setTwoFaMessage] = useState(null);
            const [disablePassword, setDisablePassword] = useState('');
            const [regeneratePassword, setRegeneratePassword] = useState('');

            // Fetch MCP configuration and 2FA status on mount
            useEffect(() => {
                const fetchMcpConfig = async () => {
                    try {
                        const response = await fetch(`${API_BASE}/mcp-config`);
                        if (response.ok) {
                            const data = await response.json();
                            setMcpConfig(data);
                        } else {
                            const data = await response.json();
                            setMcpError(data.error || 'Failed to load MCP configuration');
                        }
                    } catch (err) {
                        setMcpError('Failed to load MCP configuration');
                    }
                    setMcpLoading(false);
                };

                const fetch2FaStatus = async () => {
                    try {
                        const response = await fetch(`${API_BASE}/2fa/status`);
                        if (response.ok) {
                            const data = await response.json();
                            setTwoFaStatus(data);
                        }
                    } catch (err) {
                        console.error('Failed to fetch 2FA status:', err);
                    }
                    setTwoFaLoading(false);
                };

                const fetchApiKeys = async () => {
                    try {
                        const response = await fetch(`${API_BASE}/api-keys`);
                        if (response.ok) {
                            const data = await response.json();
                            setApiKeys(data);
                        }
                    } catch (err) {
                        console.error('Failed to fetch API keys:', err);
                    }
                    setApiKeysLoading(false);
                };

                fetchMcpConfig();
                fetch2FaStatus();
                fetchApiKeys();
            }, []);

            // API Key handlers
            const createApiKey = async () => {
                setApiKeyError(null);
                setNewKeyResult(null);
                setApiKeyCreating(true);
                try {
                    const response = await fetch(`${API_BASE}/api-keys`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ label: newKeyLabel.trim() || 'MCP' }),
                    });
                    const data = await response.json();
                    if (response.ok) {
                        setNewKeyResult(data);
                        setNewKeyLabel('MCP');
                        // Refresh the key list
                        const listResp = await fetch(`${API_BASE}/api-keys`);
                        if (listResp.ok) setApiKeys(await listResp.json());
                    } else {
                        setApiKeyError(data.error || 'Failed to create API key');
                    }
                } catch (err) {
                    setApiKeyError('Failed to create API key');
                }
                setApiKeyCreating(false);
            };

            const revokeApiKey = async (keyId, keyPrefix) => {
                if (!confirm(`Revoke API key ${keyPrefix}...? This cannot be undone.`)) return;
                try {
                    const response = await fetch(`${API_BASE}/api-keys/${keyId}`, { method: 'DELETE' });
                    if (response.ok) {
                        setApiKeys(prev => prev.filter(k => k.id !== keyId));
                        // Clear the new key display if this key was just created
                        if (newKeyResult && newKeyResult.id === keyId) setNewKeyResult(null);
                    }
                } catch (err) {
                    console.error('Failed to revoke key:', err);
                }
            };

            const copyToClipboard = async (text, label) => {
                try {
                    await navigator.clipboard.writeText(text);
                    setCopied(label);
                    setTimeout(() => setCopied(null), 2000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                }
            };

            // 2FA handlers
            const start2FaSetup = async () => {
                setTwoFaError(null);
                setTwoFaMessage(null);
                try {
                    const response = await fetch(`${API_BASE}/2fa/setup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const data = await response.json();
                    if (response.ok) {
                        setTwoFaSetup({ secret: data.secret, uri: data.uri });
                    } else {
                        setTwoFaError(data.error || 'Failed to start 2FA setup');
                    }
                } catch (err) {
                    setTwoFaError('Failed to start 2FA setup');
                }
            };

            const verify2FaSetup = async () => {
                setTwoFaError(null);
                if (!twoFaCode || twoFaCode.length !== 6) {
                    setTwoFaError('Please enter a 6-digit code');
                    return;
                }
                try {
                    const response = await fetch(`${API_BASE}/2fa/verify-setup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code: twoFaCode })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        setBackupCodes(data.backup_codes);
                        setTwoFaStatus({ enabled: true, backup_codes_remaining: 10 });
                        setTwoFaSetup(null);
                        setTwoFaCode('');
                        setTwoFaMessage('2FA enabled successfully! Save your backup codes.');
                    } else {
                        setTwoFaError(data.error || 'Invalid verification code');
                    }
                } catch (err) {
                    setTwoFaError('Failed to verify 2FA code');
                }
            };

            const disable2Fa = async () => {
                setTwoFaError(null);
                setTwoFaMessage(null);
                if (!disablePassword) {
                    setTwoFaError('Password required to disable 2FA');
                    return;
                }
                try {
                    const response = await fetch(`${API_BASE}/2fa/disable`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: disablePassword })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        setTwoFaStatus({ enabled: false });
                        setDisablePassword('');
                        setBackupCodes(null);
                        setTwoFaMessage('2FA has been disabled');
                    } else {
                        setTwoFaError(data.error || 'Failed to disable 2FA');
                    }
                } catch (err) {
                    setTwoFaError('Failed to disable 2FA');
                }
            };

            const regenerateBackupCodes = async () => {
                setTwoFaError(null);
                setTwoFaMessage(null);
                if (!regeneratePassword) {
                    setTwoFaError('Password required to regenerate backup codes');
                    return;
                }
                try {
                    const response = await fetch(`${API_BASE}/2fa/regenerate-backup-codes`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: regeneratePassword })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        setBackupCodes(data.backup_codes);
                        setRegeneratePassword('');
                        setTwoFaMessage('New backup codes generated. Previous codes are now invalid.');
                        // Refresh status to get new count
                        const statusResp = await fetch(`${API_BASE}/2fa/status`);
                        if (statusResp.ok) {
                            setTwoFaStatus(await statusResp.json());
                        }
                    } else {
                        setTwoFaError(data.error || 'Failed to regenerate backup codes');
                    }
                } catch (err) {
                    setTwoFaError('Failed to regenerate backup codes');
                }
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                setMessage(null);
                setError(null);

                if (newPassword !== confirmPassword) {
                    setError('New passwords do not match');
                    return;
                }

                if (newPassword.length < 8) {
                    setError('New password must be at least 8 characters');
                    return;
                }

                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/change-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            current_password: currentPassword,
                            new_password: newPassword
                        })
                    });
                    const data = await response.json();

                    if (response.ok && data.success) {
                        setMessage('Password changed successfully');
                        setCurrentPassword('');
                        setNewPassword('');
                        setConfirmPassword('');
                    } else {
                        setError(data.error || 'Failed to change password');
                    }
                } catch (err) {
                    setError('An error occurred. Please try again.');
                }
                setLoading(false);
            };

            return (
                <div className="manager">
                    <h2>Account Settings</h2>

                    {/* Appearance Section */}
                    <div style={{ marginBottom: '40px' }}>
                        <h3>Appearance</h3>

                        <div style={{ marginBottom: '16px' }}>
                            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 600 }}>Theme</label>
                            <div style={{ display: 'flex', gap: '12px' }}>
                                {[
                                    { value: 'dark', label: 'Dark' },
                                    { value: 'light', label: 'Light' },
                                ].map(opt => (
                                    <label key={opt.value} style={{ display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer' }}>
                                        <input
                                            type="radio"
                                            name="theme"
                                            value={opt.value}
                                            checked={(localStorage.getItem('hb-theme') || 'dark') === opt.value}
                                            onChange={(e) => {
                                                window.setTheme(e.target.value);
                                                // Force re-render
                                                setPasswordForm({ ...passwordForm });
                                            }}
                                        />
                                        {opt.label}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div>
                            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 600 }}>Activity Bar Size</label>
                            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                                {[
                                    { value: 'sm', label: 'Small' },
                                    { value: 'md', label: 'Medium' },
                                    { value: 'lg', label: 'Large' },
                                    { value: 'xl', label: 'Extra Large' },
                                ].map(opt => (
                                    <label key={opt.value} style={{ display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer' }}>
                                        <input
                                            type="radio"
                                            name="actbar-size"
                                            value={opt.value}
                                            checked={(localStorage.getItem('hb-actbar-size') || 'lg') === opt.value}
                                            onChange={(e) => {
                                                window.setActbarSize(e.target.value);
                                                // Force re-render
                                                setPasswordForm({ ...passwordForm });
                                            }}
                                        />
                                        {opt.label}
                                    </label>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Two-Factor Authentication Section */}
                    <div style={{ marginBottom: '40px' }}>
                        <h3>Two-Factor Authentication (2FA)</h3>
                        <p style={{ color: 'var(--color-muted)', marginBottom: '20px' }}>
                            Add an extra layer of security to your account by requiring a code from your authenticator app when you sign in.
                        </p>

                        {twoFaLoading && (
                            <div style={{ color: 'var(--color-muted)' }}>Loading 2FA status...</div>
                        )}

                        {twoFaMessage && (
                            <div style={{ padding: '10px', marginBottom: '15px', background: 'var(--color-success-bg)', color: 'var(--color-success)', borderRadius: '5px' }}>
                                {twoFaMessage}
                            </div>
                        )}

                        {twoFaError && (
                            <div style={{ padding: '10px', marginBottom: '15px', background: 'var(--color-error-bg)', color: 'var(--color-error)', borderRadius: '5px' }}>
                                {twoFaError}
                            </div>
                        )}

                        {/* Backup Codes Display */}
                        {backupCodes && (
                            <div style={{ marginBottom: '20px', padding: '20px', background: 'var(--color-card)', borderRadius: '8px', border: '2px solid var(--color-success)' }}>
                                <h4 style={{ marginTop: 0, color: 'var(--color-success)' }}>Backup Codes</h4>
                                <p style={{ color: 'var(--color-muted)', marginBottom: '15px' }}>
                                    Save these codes in a safe place. Each code can only be used once.
                                </p>
                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: 'repeat(2, 1fr)',
                                    gap: '10px',
                                    marginBottom: '15px'
                                }}>
                                    {backupCodes.map((code, i) => (
                                        <code key={i} style={{
                                            padding: '8px 12px',
                                            background: '#1e1e1e',
                                            color: '#d4d4d4',
                                            borderRadius: '4px',
                                            fontFamily: 'monospace',
                                            fontSize: '14px',
                                            textAlign: 'center'
                                        }}>
                                            {code}
                                        </code>
                                    ))}
                                </div>
                                <button
                                    onClick={() => copyToClipboard(backupCodes.join('\n'), 'backup')}
                                    style={{
                                        padding: '8px 16px',
                                        background: copied === 'backup' ? 'var(--color-success)' : 'var(--color-accent)',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '5px',
                                        cursor: 'pointer'
                                    }}
                                >
                                    {copied === 'backup' ? 'Copied!' : 'Copy All Codes'}
                                </button>
                                <button
                                    onClick={() => setBackupCodes(null)}
                                    style={{
                                        marginLeft: '10px',
                                        padding: '8px 16px',
                                        background: 'var(--color-muted)',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '5px',
                                        cursor: 'pointer'
                                    }}
                                >
                                    I've Saved These
                                </button>
                            </div>
                        )}

                        {!twoFaLoading && twoFaStatus && (
                            <div>
                                {/* Status Badge */}
                                <div style={{ marginBottom: '20px' }}>
                                    <span style={{
                                        display: 'inline-block',
                                        padding: '6px 12px',
                                        borderRadius: '20px',
                                        fontWeight: 'bold',
                                        background: twoFaStatus.enabled ? 'var(--color-success-bg)' : 'var(--color-error-bg)',
                                        color: twoFaStatus.enabled ? 'var(--color-success)' : 'var(--color-error)'
                                    }}>
                                        {twoFaStatus.enabled ? '2FA Enabled' : '2FA Disabled'}
                                    </span>
                                    {twoFaStatus.enabled && twoFaStatus.backup_codes_remaining !== undefined && (
                                        <span style={{ marginLeft: '15px', color: 'var(--color-muted)' }}>
                                            {twoFaStatus.backup_codes_remaining} backup codes remaining
                                        </span>
                                    )}
                                </div>

                                {/* Setup Flow (when 2FA is disabled) */}
                                {!twoFaStatus.enabled && !twoFaSetup && (
                                    <button
                                        onClick={start2FaSetup}
                                        style={{
                                            padding: '12px 24px',
                                            background: 'var(--color-success)',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '5px',
                                            cursor: 'pointer',
                                            fontSize: '16px'
                                        }}
                                    >
                                        Enable Two-Factor Authentication
                                    </button>
                                )}

                                {/* Setup in progress */}
                                {!twoFaStatus.enabled && twoFaSetup && (
                                    <div style={{ maxWidth: '500px' }}>
                                        <div style={{ marginBottom: '20px', padding: '20px', background: 'var(--color-card)', borderRadius: '8px' }}>
                                            <h4 style={{ marginTop: 0 }}>Step 1: Scan QR Code</h4>
                                            <p style={{ color: 'var(--color-muted)', marginBottom: '15px' }}>
                                                Scan this QR code with your authenticator app (Google Authenticator, Authy, etc.)
                                            </p>
                                            <div style={{
                                                padding: '20px',
                                                background: 'var(--color-card)',
                                                borderRadius: '8px',
                                                display: 'inline-block',
                                                marginBottom: '15px'
                                            }}>
                                                <img
                                                    src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(twoFaSetup.uri)}`}
                                                    alt="2FA QR Code"
                                                    style={{ display: 'block' }}
                                                />
                                            </div>
                                            <p style={{ color: 'var(--color-muted)', fontSize: '13px' }}>
                                                Or enter this code manually: <code style={{ background: 'var(--color-hover)', padding: '2px 6px', borderRadius: '3px' }}>{twoFaSetup.secret}</code>
                                            </p>
                                        </div>

                                        <div style={{ marginBottom: '20px' }}>
                                            <h4>Step 2: Verify Code</h4>
