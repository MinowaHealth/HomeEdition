                                            <p style={{ color: 'var(--color-muted)', marginBottom: '10px' }}>
                                                Enter the 6-digit code from your authenticator app:
                                            </p>
                                            <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                                                <input
                                                    type="text"
                                                    value={twoFaCode}
                                                    onChange={(e) => setTwoFaCode(e.target.value.replace(/\D/g, '').slice(0, 6))}
                                                    placeholder="000000"
                                                    maxLength="6"
                                                    style={{
                                                        width: '120px',
                                                        padding: '12px',
                                                        fontSize: '24px',
                                                        fontFamily: 'monospace',
                                                        textAlign: 'center',
                                                        borderRadius: '5px',
                                                        border: '2px solid #ccc',
                                                        letterSpacing: '4px'
                                                    }}
                                                />
                                                <button
                                                    onClick={verify2FaSetup}
                                                    disabled={twoFaCode.length !== 6}
                                                    style={{
                                                        padding: '12px 24px',
                                                        background: twoFaCode.length === 6 ? 'var(--color-success)' : 'var(--color-muted)',
                                                        color: 'white',
                                                        border: 'none',
                                                        borderRadius: '5px',
                                                        cursor: twoFaCode.length === 6 ? 'pointer' : 'not-allowed'
                                                    }}
                                                >
                                                    Verify & Enable
                                                </button>
                                                <button
                                                    onClick={() => { setTwoFaSetup(null); setTwoFaCode(''); }}
                                                    style={{
                                                        padding: '12px 24px',
                                                        background: 'var(--color-muted)',
                                                        color: 'white',
                                                        border: 'none',
                                                        borderRadius: '5px',
                                                        cursor: 'pointer'
                                                    }}
                                                >
                                                    Cancel
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Manage 2FA (when enabled) */}
                                {twoFaStatus.enabled && !backupCodes && (
                                    <div style={{ maxWidth: '400px' }}>
                                        {/* Regenerate Backup Codes */}
                                        <div style={{ marginBottom: '30px' }}>
                                            <h4>Regenerate Backup Codes</h4>
                                            <p style={{ color: 'var(--color-muted)', marginBottom: '10px', fontSize: '14px' }}>
                                                Generate new backup codes. This will invalidate all existing codes.
                                            </p>
                                            <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                                                <input
                                                    type="password"
                                                    value={regeneratePassword}
                                                    onChange={(e) => setRegeneratePassword(e.target.value)}
                                                    placeholder="Enter password"
                                                    style={{
                                                        flex: 1,
                                                        padding: '8px',
                                                        borderRadius: '4px',
                                                        border: '1px solid #ccc'
                                                    }}
                                                />
                                                <button
                                                    onClick={regenerateBackupCodes}
                                                    style={{
                                                        padding: '8px 16px',
                                                        background: 'var(--color-accent)',
                                                        color: 'white',
                                                        border: 'none',
                                                        borderRadius: '5px',
                                                        cursor: 'pointer',
                                                        whiteSpace: 'nowrap'
                                                    }}
                                                >
                                                    Regenerate
                                                </button>
                                            </div>
                                        </div>

                                        {/* Disable 2FA */}
                                        <div style={{ paddingTop: '20px', borderTop: '1px solid #e0e0e0' }}>
                                            <h4>Disable 2FA</h4>
                                            <p style={{ color: 'var(--color-muted)', marginBottom: '10px', fontSize: '14px' }}>
                                                This will remove the additional security layer from your account.
                                            </p>
                                            <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                                                <input
                                                    type="password"
                                                    value={disablePassword}
                                                    onChange={(e) => setDisablePassword(e.target.value)}
                                                    placeholder="Enter password"
                                                    style={{
                                                        flex: 1,
                                                        padding: '8px',
                                                        borderRadius: '4px',
                                                        border: '1px solid #ccc'
                                                    }}
                                                />
                                                <button
                                                    onClick={disable2Fa}
                                                    style={{
                                                        padding: '8px 16px',
                                                        background: 'var(--color-error)',
                                                        color: 'white',
                                                        border: 'none',
                                                        borderRadius: '5px',
                                                        cursor: 'pointer',
                                                        whiteSpace: 'nowrap'
                                                    }}
                                                >
                                                    Disable 2FA
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Change Password Section */}
                    <div style={{ maxWidth: '400px', borderTop: '1px solid #e0e0e0', paddingTop: '30px' }}>
                        <h3>Change Password</h3>

                        {message && (
                            <div style={{ padding: '10px', marginBottom: '15px', background: 'var(--color-success-bg)', color: 'var(--color-success)', borderRadius: '5px' }}>
                                {message}
                            </div>
                        )}

                        {error && (
                            <div style={{ padding: '10px', marginBottom: '15px', background: 'var(--color-error-bg)', color: 'var(--color-error)', borderRadius: '5px' }}>
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleChangePassword}>
                            <div style={{ marginBottom: '15px' }}>
                                <label style={{ display: 'block', marginBottom: '5px', fontWeight: 'bold' }}>
                                    Current Password
                                </label>
                                <input
                                    type="password"
                                    value={currentPassword}
                                    onChange={(e) => setCurrentPassword(e.target.value)}
                                    required
                                    style={{ width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid #ccc' }}
                                    autoComplete="current-password"
                                />
                            </div>

                            <div style={{ marginBottom: '15px' }}>
                                <label style={{ display: 'block', marginBottom: '5px', fontWeight: 'bold' }}>
                                    New Password
                                </label>
                                <input
                                    type="password"
                                    value={newPassword}
                                    onChange={(e) => setNewPassword(e.target.value)}
                                    required
                                    minLength="8"
                                    style={{ width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid #ccc' }}
                                    autoComplete="new-password"
                                />
                                <small style={{ color: 'var(--color-muted)' }}>Minimum 8 characters</small>
                            </div>

                            <div style={{ marginBottom: '15px' }}>
                                <label style={{ display: 'block', marginBottom: '5px', fontWeight: 'bold' }}>
                                    Confirm New Password
                                </label>
                                <input
                                    type="password"
                                    value={confirmPassword}
                                    onChange={(e) => setConfirmPassword(e.target.value)}
                                    required
                                    minLength="8"
                                    style={{ width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid #ccc' }}
                                    autoComplete="new-password"
                                />
                            </div>

                            <button
                                type="submit"
                                disabled={loading}
                                style={{
                                    padding: '10px 20px',
                                    background: 'var(--color-accent)',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '5px',
                                    cursor: loading ? 'not-allowed' : 'pointer',
                                    opacity: loading ? 0.6 : 1
                                }}
                            >
                                {loading ? 'Changing...' : 'Change Password'}
                            </button>
                        </form>
                    </div>

                    {/* MCP Configuration Section */}
                    <div style={{ marginTop: '40px', borderTop: '1px solid var(--color-border)', paddingTop: '30px' }}>
                        <h3>MCP Server Configuration</h3>
                        <p style={{ color: 'var(--color-muted)', marginBottom: '20px' }}>
                            Use this configuration to connect Claude Desktop or other MCP clients to your health database (read-only access).
                        </p>

                        {mcpLoading && (
                            <div style={{ color: 'var(--color-muted)' }}>Loading configuration...</div>
                        )}

                        {mcpError && (
                            <div style={{ padding: '10px', background: 'var(--color-error-bg)', color: 'var(--color-error)', borderRadius: '5px', border: '1px solid var(--color-error-border)' }}>
                                {mcpError}
                            </div>
                        )}

                        {mcpConfig && (
                            <div>
                                {/* Database Info */}
                                <div style={{ marginBottom: '20px', padding: '15px', background: 'var(--color-card)', borderRadius: '8px', border: '1px solid var(--color-border)' }}>
                                    <div style={{ marginBottom: '10px', color: 'var(--color-text)' }}>
                                        <strong>Database:</strong> <code style={{ background: 'var(--color-hover)', padding: '2px 6px', borderRadius: '3px', color: 'var(--color-text)' }}>{mcpConfig.database_name}</code>
                                    </div>
                                    <div style={{ marginBottom: '10px', color: 'var(--color-text)' }}>
                                        <strong>MCP User:</strong> <code style={{ background: 'var(--color-hover)', padding: '2px 6px', borderRadius: '3px', color: 'var(--color-text)' }}>{mcpConfig.mcp_user}</code>
                                    </div>
                                    <div style={{ color: 'var(--color-text)' }}>
                                        <strong>Host:</strong> <code style={{ background: 'var(--color-hover)', padding: '2px 6px', borderRadius: '3px', color: 'var(--color-text)' }}>{mcpConfig.host}:{mcpConfig.port}</code>
                                    </div>
                                </div>

                                {/* Connection String */}
                                <div style={{ marginBottom: '20px' }}>
                                    <label style={{ display: 'block', marginBottom: '8px', fontWeight: 'bold', color: 'var(--color-text)' }}>
                                        SSE Endpoint
                                    </label>
                                    <div style={{ display: 'flex', gap: '10px', alignItems: 'stretch' }}>
                                        <code style={{
                                            flex: 1,
                                            padding: '10px',
                                            background: '#1e1e2e',
                                            color: '#e2e8f0',
                                            borderRadius: '5px',
                                            fontSize: '13px',
                                            wordBreak: 'break-all',
                                            fontFamily: 'var(--font-mono)',
                                            border: '1px solid var(--color-border)'
                                        }}>
                                            {mcpConfig.connection_string}
                                        </code>
                                        <button
                                            onClick={() => copyToClipboard(mcpConfig.connection_string, 'connection')}
                                            style={{
                                                padding: '10px 15px',
                                                background: copied === 'connection' ? 'var(--color-success)' : 'var(--color-accent)',
                                                color: 'white',
                                                border: 'none',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                whiteSpace: 'nowrap'
                                            }}
                                        >
                                            {copied === 'connection' ? 'Copied!' : 'Copy'}
                                        </button>
                                    </div>
                                    <small style={{ color: 'var(--color-muted)', display: 'block', marginTop: '5px' }}>
                                        {mcpConfig.note}
                                    </small>
                                </div>

                                {/* Note about read-only access */}
                                <div style={{ padding: '12px', background: 'var(--color-warning-bg)', color: 'var(--color-warning)', borderRadius: '5px', fontSize: '14px', border: '1px solid var(--color-warning-border)' }}>
                                    <strong>Note:</strong> The MCP user has read-only access to your health data.
                                    It cannot modify or delete any records.
                                </div>
                            </div>
                        )}
                    </div>

                    {/* API Keys Section */}
                    <div style={{ marginTop: '40px', borderTop: '1px solid var(--color-border)', paddingTop: '30px' }}>
                        <h3>API Keys</h3>
                        <p style={{ color: 'var(--color-muted)', marginBottom: '20px' }}>
                            Generate long-lived API keys for MCP clients. Keys never expire — revoke them when no longer needed.
                        </p>

                        {/* Create new key */}
                        <div style={{ marginBottom: '20px', padding: '15px', background: 'var(--color-card)', borderRadius: '8px', border: '1px solid var(--color-border)' }}>
                            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 'bold', color: 'var(--color-text)' }}>
                                Generate New API Key
                            </label>
                            <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                                <input
                                    type="text"
                                    value={newKeyLabel}
                                    onChange={e => setNewKeyLabel(e.target.value)}
                                    placeholder="Label (e.g. MCP, Claude Desktop)"
                                    maxLength={100}
                                    style={{
                                        flex: 1,
                                        padding: '8px 12px',
                                        border: '1px solid var(--color-border)',
                                        borderRadius: '5px',
                                        fontSize: '14px',
                                        background: 'var(--color-bg)',
                                        color: 'var(--color-text)',
                                    }}
                                />
                                <button
                                    onClick={createApiKey}
                                    disabled={apiKeyCreating}
                                    style={{
                                        padding: '8px 20px',
                                        background: apiKeyCreating ? 'var(--color-muted)' : 'var(--color-accent)',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '5px',
                                        cursor: apiKeyCreating ? 'not-allowed' : 'pointer',
                                        whiteSpace: 'nowrap',
                                    }}
                                >
                                    {apiKeyCreating ? 'Generating...' : 'Generate Key'}
                                </button>
                            </div>

                            {apiKeyError && (
                                <div style={{ marginTop: '10px', padding: '10px', background: 'var(--color-error-bg)', color: 'var(--color-error)', borderRadius: '5px', fontSize: '14px', border: '1px solid var(--color-error-border)' }}>
                                    {apiKeyError}
                                </div>
                            )}
                        </div>

                        {/* New key display (shown once) */}
                        {newKeyResult && (
                            <div style={{
                                marginBottom: '20px',
                                padding: '15px',
                                background: 'var(--color-success-bg)',
                                border: '2px solid var(--color-success-border)',
                                borderRadius: '8px',
                            }}>
                                <div style={{ fontWeight: 'bold', marginBottom: '10px', color: 'var(--color-success)' }}>
                                    API Key Created — Copy It Now
                                </div>
                                <div style={{ display: 'flex', gap: '10px', alignItems: 'center', marginBottom: '12px' }}>
                                    <code style={{
                                        flex: 1,
                                        padding: '10px',
                                        background: '#1e1e2e',
                                        color: '#4ec9b0',
                                        borderRadius: '5px',
                                        fontSize: '13px',
                                        wordBreak: 'break-all',
                                        fontFamily: 'var(--font-mono)',
                                        border: '1px solid var(--color-border)',
                                    }}>
                                        {newKeyResult.key}
                                    </code>
                                    <button
                                        onClick={() => copyToClipboard(newKeyResult.key, 'apikey')}
                                        style={{
                                            padding: '10px 15px',
                                            background: copied === 'apikey' ? 'var(--color-success)' : 'var(--color-accent)',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '5px',
                                            cursor: 'pointer',
                                            whiteSpace: 'nowrap',
                                        }}
                                    >
                                        {copied === 'apikey' ? 'Copied!' : 'Copy'}
                                    </button>
                                </div>

                                {/* Claude Desktop config with the actual key */}
                                {mcpConfig && mcpConfig.claude_desktop_config && (() => {
                                    const fullConfig = JSON.parse(JSON.stringify(mcpConfig.claude_desktop_config));
                                    const serverName = Object.keys(fullConfig)[0];
                                    const serverConfig = fullConfig[serverName];
                                    const args = serverConfig.args;
                                    const headerIdx = args.indexOf('--header');
                                    if (headerIdx >= 0 && args[headerIdx + 1]) {
                                        args[headerIdx + 1] = `authorization:Bearer ${newKeyResult.key}`;
                                    }
                                    const stanza = `"${serverName}": ${JSON.stringify(serverConfig, null, 2).split('\n').join('\n  ')}`;
                                    const indented = stanza.split('\n').map(l => '    ' + l).join('\n');
                                    return (
                                        <div style={{ marginTop: '4px' }}>
                                            <label style={{ display: 'block', marginBottom: '6px', fontWeight: 'bold', fontSize: '13px', color: 'var(--color-success)' }}>
                                                Claude Desktop Config (ready to paste into mcpServers):
                                            </label>
                                            <div style={{ display: 'flex', gap: '10px', alignItems: 'stretch' }}>
                                                <pre style={{
                                                    flex: 1,
                                                    padding: '12px',
                                                    background: '#1e1e2e',
                                                    color: '#e2e8f0',
                                                    borderRadius: '5px',
                                                    fontSize: '11px',
                                                    overflow: 'auto',
                                                    margin: 0,
                                                    fontFamily: 'var(--font-mono)',
                                                    border: '1px solid var(--color-border)',
                                                }}>
{indented}
                                                </pre>
                                                <button
                                                    onClick={() => copyToClipboard(indented, 'newkeyconfig')}
                                                    style={{
                                                        padding: '10px 15px',
                                                        background: copied === 'newkeyconfig' ? 'var(--color-success)' : 'var(--color-accent)',
                                                        color: 'white',
                                                        border: 'none',
                                                        borderRadius: '5px',
                                                        cursor: 'pointer',
                                                        whiteSpace: 'nowrap',
                                                        alignSelf: 'flex-start',
                                                    }}
                                                >
                                                    {copied === 'newkeyconfig' ? 'Copied!' : 'Copy'}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })()}

                                <small style={{ color: 'var(--color-warning)', display: 'block', marginTop: '10px', fontWeight: 'bold' }}>
                                    This key will not be shown again. Store it securely.
                                </small>
                            </div>
                        )}

                        {/* Active keys list */}
                        {apiKeysLoading ? (
                            <div style={{ color: 'var(--color-muted)' }}>Loading API keys...</div>
                        ) : apiKeys.length === 0 ? (
                            <div style={{ color: 'var(--color-muted)', fontStyle: 'italic' }}>No active API keys.</div>
                        ) : (
                            <div>
                                <label style={{ display: 'block', marginBottom: '8px', fontWeight: 'bold', color: 'var(--color-text)' }}>
                                    Active Keys ({apiKeys.length})
                                </label>
                                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '14px' }}>
                                    <thead>
                                        <tr style={{ borderBottom: '2px solid var(--color-border)', textAlign: 'left' }}>
                                            <th style={{ padding: '8px', color: 'var(--color-text)' }}>Label</th>
                                            <th style={{ padding: '8px', color: 'var(--color-text)' }}>Key Prefix</th>
                                            <th style={{ padding: '8px', color: 'var(--color-text)' }}>Created</th>
                                            <th style={{ padding: '8px', color: 'var(--color-text)' }}>Last Used</th>
                                            <th style={{ padding: '8px' }}></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {apiKeys.map(k => (
                                            <tr key={k.id} style={{ borderBottom: '1px solid var(--color-border)' }}>
                                                <td style={{ padding: '8px', color: 'var(--color-text)' }}>{k.label}</td>
                                                <td style={{ padding: '8px' }}>
                                                    <code style={{ background: 'var(--color-hover)', padding: '2px 6px', borderRadius: '3px', color: 'var(--color-text)' }}>
                                                        {k.key_prefix}...
                                                    </code>
                                                </td>
                                                <td style={{ padding: '8px', color: 'var(--color-muted)' }}>
                                                    {new Date(k.created_at).toLocaleDateString()}
                                                </td>
                                                <td style={{ padding: '8px', color: 'var(--color-muted)' }}>
                                                    {k.last_used_at ? new Date(k.last_used_at).toLocaleDateString() : 'Never'}
                                                </td>
                                                <td style={{ padding: '8px' }}>
                                                    <button
                                                        onClick={() => revokeApiKey(k.id, k.key_prefix)}
                                                        style={{
                                                            padding: '4px 12px',
                                                            background: 'var(--color-error)',
                                                            color: 'white',
                                                            border: 'none',
                                                            borderRadius: '4px',
                                                            cursor: 'pointer',
                                                            fontSize: '13px',
                                                        }}
                                                    >
                                                        Revoke
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== LOGGING ====================

        function LoggingManager() {
            const [meals, setMeals] = useState([]);
            const [stacks, setStacks] = useState([]);
            const [healthInputs, setHealthInputs] = useState([]);
            const [foodItems, setFoodItems] = useState([]);
            const [logHistory, setLogHistory] = useState([]);
            const [editing, setEditing] = useState(null);
            const [logType, setLogType] = useState('health-input');
            const [timestampTouched, setTimestampTouched] = useState(false);
            const [formData, setFormData] = useState({
                meal_id: '',
                stack_id: '',
                input_id: '',
                food_item_id: '',
                dosage: '',
                quantity: '1.0',
                systolic: '',
                diastolic: '',
                heart_rate: '',
                temperature: '',
                temp_unit: 'F',
                weight: '',
                weight_unit: 'lbs',
                timestamp: getPacificTimeString()
            });

            useEffect(() => {
                fetchMeals();
                fetchStacks();
                fetchHealthInputs();
                fetchFoodItems();
                fetchLogHistory();
            }, []);

            const fetchMeals = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/meals?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setMeals(all);
            };

            const fetchStacks = async () => {
                const response = await fetch(`${API_BASE}/stacks`);
                const data = await response.json();
                setStacks(data.entries || []);
            };

            const fetchHealthInputs = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/health-inputs?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setHealthInputs(all);
            };

            const fetchFoodItems = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/food-items?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setFoodItems(all);
            };

            const fetchLogHistory = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/all-logs?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setLogHistory(all);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                // Auto-refresh timestamp to "now" if user hasn't manually changed it
                const submitTimestamp = timestampTouched ? formData.timestamp : getPacificTimeString();
                if (!timestampTouched) {
                    setFormData(prev => ({ ...prev, timestamp: submitTimestamp }));
                }

                if (editing) {
                    // Update existing log entry
                    let endpoint, payload;

                    if (logType === 'food-item') {
                        endpoint = `food-log/${editing}`;
                        payload = {
                            quantity: formData.quantity,
                            timestamp: submitTimestamp
                        };
                    } else {
                        // health-input
                        endpoint = `health-input-log/${editing}`;
                        payload = {
                            dosage: formData.dosage,
                            timestamp: submitTimestamp
                        };
                    }

                    const response = await fetch(`${API_BASE}/${endpoint}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        resetForm();
                        fetchLogHistory();
                    }
                } else {
                    // Create new log entry
                    let endpoint, payload;

                    if (logType === 'meal') {
                        endpoint = 'log-meal';
                        payload = { meal_id: formData.meal_id, timestamp: submitTimestamp };
                    } else if (logType === 'stack') {
                        endpoint = 'log-stack';
                        payload = { stack_id: formData.stack_id, timestamp: submitTimestamp };
                    } else if (logType === 'food-item') {
                        endpoint = 'log-food-item';
                        payload = {
                            food_item_id: formData.food_item_id,
                            quantity: formData.quantity,
                            timestamp: submitTimestamp
                        };
                    } else if (logType === 'blood-pressure') {
                        endpoint = 'blood-pressure';
                        payload = {
                            systolic: formData.systolic,
                            diastolic: formData.diastolic,
                            heart_rate: formData.heart_rate || null,
                            timestamp: submitTimestamp
                        };
                    } else if (logType === 'temperature') {
                        endpoint = 'temperature';
                        payload = {
                            temperature: formData.temperature,
                            unit: formData.temp_unit || 'F',
                            timestamp: submitTimestamp
                        };
                        console.log('Temperature payload:', payload);
                    } else if (logType === 'weight') {
                        endpoint = 'weight';
                        payload = {
                            weight: formData.weight,
                            unit: formData.weight_unit || 'lbs',
                            timestamp: submitTimestamp
                        };
                        console.log('Weight payload:', payload);
                    } else {
                        // health-input or alternative
                        endpoint = 'log-health-input';
                        payload = {
                            input_id: formData.input_id,
                            dosage: formData.quantity ? (parseFloat(formData.quantity) * parseFloat(formData.dosage)).toString() : formData.dosage,
                            timestamp: submitTimestamp
                        };
                    }

                    const response = await fetch(`${API_BASE}/${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        resetForm();
                        fetchLogHistory();
                    } else {
                        const error = await response.text();
                        alert(`Error: ${error}`);
                    }
                }
            };

            const handleEdit = (log) => {
                setEditing(log.id);
                setTimestampTouched(true);
                const localTime = getPacificTimeString(new Date(log.timestamp));

                if (log.type === 'food') {
                    setFormData({
                        meal_id: '',
                        stack_id: '',
                        input_id: '',
                        food_item_id: log.food_item_id || '',
                        food_name: log.food_name || '',
                        quantity: log.quantity || '',
                        dosage: '',
                        timestamp: localTime
                    });
                    setLogType('food-item');
                } else {
                    // health_input
                    setFormData({
                        meal_id: '',
                        stack_id: '',
                        input_id: log.input_id || '',
                        input_name: log.input_name || '',
                        dosage: log.dosage_taken || '',
                        default_unit: log.default_unit || '',
                        food_item_id: '',
                        quantity: '',
                        timestamp: localTime
                    });
                    setLogType('health-input');
                }
            };

            const handleDelete = async (id, type) => {
                let endpoint;
                switch (type) {
                    case 'health_input':
                        endpoint = `health-input-log/${id}`;
                        break;
                    case 'food':
                        endpoint = `food-log/${id}`;
                        break;
                    case 'blood_pressure':
                        endpoint = `blood-pressure/${id}`;
                        break;
                    case 'temperature':
                    case 'weight':
                        endpoint = `health-metrics/${id}`;
                        break;
                    default:
                        console.error('Unknown log type:', type);
                        return;
                }

                await fetch(`${API_BASE}/${endpoint}`, { method: 'DELETE' });
                fetchLogHistory();
            };

            const resetForm = () => {
                setEditing(null);
                setTimestampTouched(false);
                setFormData({
                    meal_id: '',
                    stack_id: '',
                    input_id: '',
                    dosage: '',
                    timestamp: getPacificTimeString()
                });
            };

            const getSelectedInputUnit = () => {
                if (!formData.input_id) return '';
                const input = healthInputs.find(hi => hi.id === formData.input_id);
                return input?.default_unit || '';
            };

            const formatTimestamp = (timestamp) => {
                const date = new Date(timestamp);
                const options = {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false,
                    timeZone: 'America/Los_Angeles'
                };
                return date.toLocaleString('en-US', options) + ' PT';
            };

            return (
                <div className="manager">
                    <h2>Logging</h2>

                    <div style={{
                        marginBottom: 'var(--space-sm)',
                        padding: '10px 14px',
                        border: '1px solid var(--color-border)',
                        borderRadius: '8px',
                        background: 'var(--color-surface)'
                    }}>
                        <label style={{ fontSize: '0.8rem', fontWeight: '600', color: 'var(--color-muted)', marginBottom: '6px', display: 'block', textTransform: 'uppercase', letterSpacing: '0.03em' }}>Log Time (PT)</label>
                        <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                            <input
                                type="date"
                                value={formData.timestamp.split('T')[0]}
                                style={{ flex: 1, padding: '6px 8px', border: '1px solid var(--color-border)', borderRadius: '4px', background: 'var(--color-bg)', color: 'var(--color-text)', fontSize: '0.95rem' }}
                                onChange={(e) => {
                                    const time = formData.timestamp.split('T')[1] || '12:00';
                                    setTimestampTouched(true);
                                    setFormData({ ...formData, timestamp: `${e.target.value}T${time}` });
                                }}
                            />
                            <input
                                type="time"
                                value={formData.timestamp.split('T')[1] || '12:00'}
                                style={{ flex: 1, padding: '6px 8px', border: '1px solid var(--color-border)', borderRadius: '4px', background: 'var(--color-bg)', color: 'var(--color-text)', fontSize: '0.95rem' }}
                                onChange={(e) => {
                                    const date = formData.timestamp.split('T')[0];
                                    setTimestampTouched(true);
                                    setFormData({ ...formData, timestamp: `${date}T${e.target.value}` });
                                }}
                            />
                            <button type="button" className="btn" onClick={() => {
                                setTimestampTouched(false);
                                setFormData({ ...formData, timestamp: getPacificTimeString() });
                            }} style={{ fontSize: '0.8rem', padding: '6px 12px', whiteSpace: 'nowrap' }}>Now</button>
                        </div>
                    </div>

                    {!editing && (
                        <div className="form-row">
                            <label>
                                <input
                                    type="radio"
                                    value="health-input"
                                    checked={logType === 'health-input'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Log Health Input
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="stack"
                                    checked={logType === 'stack'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Log Stack
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="meal"
                                    checked={logType === 'meal'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Log Meal
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="food-item"
                                    checked={logType === 'food-item'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Log Food Item
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="alternative"
                                    checked={logType === 'alternative'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Log Alternative
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="blood-pressure"
                                    checked={logType === 'blood-pressure'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Blood Pressure
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="temperature"
                                    checked={logType === 'temperature'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Temperature
                            </label>
                            <label>
                                <input
                                    type="radio"
                                    value="weight"
                                    checked={logType === 'weight'}
                                    onChange={(e) => setLogType(e.target.value)}
                                />
                                Weight
                            </label>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="form">
                        {editing ? (
                            <>
                                <h3>Edit Log Entry</h3>
                                {formData.input_name && (
                                    <p style={{
                                        margin: '0 0 15px 0',
                                        padding: '10px',
                                        background: '#f0f4ff',
                                        borderRadius: '6px',
                                        color: 'var(--color-accent)',
                                        fontWeight: 'bold'
                                    }}>
                                        Editing: {formData.input_name}
                                    </p>
                                )}
                                {formData.food_name && (
                                    <p style={{
                                        margin: '0 0 15px 0',
                                        padding: '10px',
                                        background: '#fff3e0',
                                        borderRadius: '6px',
                                        color: '#FF5722',
                                        fontWeight: 'bold'
                                    }}>
                                        Editing: {formData.food_name}
                                    </p>
                                )}
                                <div className="form-row">
                                    {logType === 'food-item' ? (
                                        <input
                                            type="text"
                                            placeholder="Quantity"
                                            value={formData.quantity}
                                            onChange={(e) => setFormData({ ...formData, quantity: e.target.value })}
                                            required
                                        />
                                    ) : (
                                        <input
                                            type="text"
                                            placeholder={`Dosage${formData.default_unit ? ' (' + formData.default_unit + ')' : ''}`}
                                            value={formData.dosage}
                                            onChange={(e) => setFormData({ ...formData, dosage: e.target.value })}
                                            required
                                        />
                                    )}
                                </div>
                            </>
                        ) : logType === 'health-input' ? (
                            <>
                                <div className="form-row">
                                    <select
                                        value={formData.input_id}
                                        onChange={(e) => {
                                            const selectedInput = healthInputs.find(i => i.id === e.target.value);
                                            setFormData({
                                                ...formData,
                                                input_id: e.target.value,
                                                quantity: '1.0',
                                                dosage: selectedInput?.default_dosage || ''
                                            });
                                        }}
                                        required
                                    >
                                        <option value="">Select Health Input</option>
                                        {(() => {
                                            const frequent = healthInputs.filter(i => i.frequent_status === 'sticky' || i.frequent_status === 'detected');
                                            const rest = healthInputs.filter(i => !i.frequent_status);
                                            const renderOption = (input) => (
                                                <option key={input.id} value={input.id}>
                                                    {input.name} {input.default_dosage && input.default_unit ? `(${input.default_dosage} ${input.default_unit})` : ''}
                                                </option>
                                            );
                                            return <>
                                                {frequent.length > 0 && <optgroup label="Frequent">{frequent.map(renderOption)}</optgroup>}
                                                {rest.length > 0 && <optgroup label={frequent.length > 0 ? "All" : "Medications"}>{rest.map(renderOption)}</optgroup>}
                                            </>;
                                        })()}
                                    </select>

                                    {formData.input_id && (() => {
                                        const selectedInput = healthInputs.find(i => i.id === formData.input_id);
                                        if (selectedInput && selectedInput.default_dosage) {
                                            const count = parseFloat(formData.quantity || 1);
                                            const totalDosage = (parseFloat(selectedInput.default_dosage) * count).toFixed(1);
                                            return (
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                    <button
                                                        type="button"
                                                        onClick={() => setFormData({ ...formData, quantity: Math.max(0.5, count - 0.5).toString() })}
                                                        style={{ width: '40px', padding: '8px' }}
                                                    >
                                                        −
                                                    </button>
                                                    <span style={{ minWidth: '120px', textAlign: 'center', fontWeight: 'bold' }}>
                                                        {count}x = {totalDosage} {selectedInput.default_unit}
                                                    </span>
                                                    <button
                                                        type="button"
                                                        onClick={() => setFormData({ ...formData, quantity: (count + 0.5).toString() })}
                                                        style={{ width: '40px', padding: '8px' }}
                                                    >
                                                        +
                                                    </button>
                                                </div>
                                            );
                                        }
                                        return null;
                                    })()}
                                </div>
                            </>
                        ) : logType === 'alternative' ? (

        function ObservationsManager() {
            const [observations, setObservations] = useState([]);

            const [formData, setFormData] = useState({

            useEffect(() => {
                fetchObservations();
            }, []);

            const fetchObservations = async () => {
                const pageSize = 200;
                const all = [];
                let offset = 0;
                while (true) {
                    const response = await fetch(`${API_BASE}/observations?limit=${pageSize}&offset=${offset}`);
                    const data = await response.json();
                    const page = data.entries || [];
                    all.push(...page);
                    if (!data.pagination?.has_more) break;
                    offset += pageSize;
                }
                setObservations(all);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                // Auto-refresh timestamp to "now" if user hasn't manually changed it
                const submitData = timestampTouched
                    ? formData
                    : { ...formData, timestamp: getPacificTimeString() };
                if (!timestampTouched) {
                    setFormData(submitData);
                }

                if (editing) {
                    await fetch(`${API_BASE}/observations/${editing}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(submitData)
                    });
                } else {
                    await fetch(`${API_BASE}/observations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(submitData)
                    });
                }

                setTimestampTouched(false);
                setFormData({
                    observation: '',
                    timestamp: getPacificTimeString()
                });
                setEditing(null);
                fetchObservations();
            };

            const handleEdit = (obs) => {
                setEditing(obs.id);
                setTimestampTouched(true);
                setFormData({
                    observation: obs.observation,
                    timestamp: getPacificTimeString(new Date(obs.timestamp))
                });
            };

            const handleDelete = async (id) => {
                await fetch(`${API_BASE}/observations/${id}`, { method: 'DELETE' });
                fetchObservations();
            };

                setEditing(null);
                setTimestampTouched(false);
                setFormData({
                    observation: '',
                    timestamp: getPacificTimeString()
                });
            };

            const formatTimestamp = (timestamp) => {
                const date = new Date(timestamp);

                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false,
                    timeZone: 'America/Los_Angeles'

                            <input
                                type="date"

                                    setTimestampTouched(true);
                                    setFormData({ ...formData, timestamp: `${e.target.value}T${time}` });
                                }}
                            />
                            <input
                                type="time"
                                value={formData.timestamp.split('T')[1] || '12:00'}
                                style={{ flex: 1, padding: '6px 8px', border: '1px solid var(--color-border)', borderRadius: '4px', background: 'var(--color-bg)', color: 'var(--color-text)', fontSize: '0.95rem' }}

        // ==================== YOUR WEEK DASHBOARD ====================

        function YourWeekDashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                fetch(`${API_BASE}/your-week`)
                    .then(res => res.json())
                    .then(result => {
                        if (result.error) {
                            setError(result.error);
                        } else {
                            setData(result);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        setError('Failed to load weekly data');
                        setLoading(false);
                    });
            }, []);

            // Color functions for each metric
            const getSleepColor = (mins) => {
                if (!mins) return 'rgb(40, 40, 45)';
                const intensity = Math.min(mins / 60, 1);
                return `rgb(${Math.round(40 + 80 * intensity)}, ${Math.round(40 + 40 * intensity)}, ${Math.round(180 + 75 * intensity)})`;
            };

            const getStepsColor = (steps) => {
                if (!steps) return 'rgb(40, 40, 45)';
                // Steps per day: 0-3000=low, 3000-7000=medium, 7000-10000+=high
                const intensity = Math.min(steps / 10000, 1);
                return `rgb(${Math.round(40 + 60 * intensity)}, ${Math.round(150 + 105 * intensity)}, ${Math.round(80 + 40 * intensity)})`;
            };

            const getStressColor = (stress) => {
                if (!stress && stress !== 0) return 'rgb(40, 40, 45)';
                // Low stress = dark (blend with background), high stress = red
                // 0-25: dark background, 25-50: dark->orange, 50-75: orange->red, 75+: deep red
                if (stress <= 25) return 'rgb(40, 40, 45)';
                if (stress <= 50) return `rgb(${Math.round(40 + (stress - 25) * 8.6)}, ${Math.round(40 + (stress - 25) * 3.2)}, ${Math.round(45 + (stress - 25) * 0.6)})`;
                if (stress <= 75) return `rgb(255, ${Math.round(120 - (stress - 50) * 2.4)}, ${Math.round(60 - (stress - 50) * 1.2)})`;
                return `rgb(255, ${Math.round(60 - Math.min((stress - 75), 25) * 2)}, 30)`;
            };

            const getHRColor = (hr) => {
                if (!hr) return 'rgb(40, 40, 45)';
                // HR: <80=normal (dark/blend), 80-100=elevated (orange), 100+=high (red)
                // Normal heart rate blends into background, only elevated/high stands out
                if (hr < 80) return 'rgb(40, 40, 45)';
                if (hr < 100) return `rgb(${Math.round(40 + (hr - 80) * 10.75)}, ${Math.round(40 + (hr - 80) * 4)}, ${Math.round(45 + (hr - 80) * 0.75)})`;
                return `rgb(255, ${Math.round(120 - Math.min((hr - 100), 40) * 2)}, 60)`;
            };

            const renderHeatmap = (days, hoursKey, getColor, title, emoji, legend, valueFormatter) => {
                if (!days || days.length === 0) {
                    return <p>No data available</p>;
                }

                return (
                    <div style={{ marginBottom: '25px' }}>
                        <h3 style={{ marginBottom: '8px', color: 'var(--color-accent)', display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <span style={{ fontSize: '24px' }}>{emoji}</span> {title}
                        </h3>

                fetch(`${API_BASE}/stress-heatmap`)

                            setError(data.error);
                        } else {

                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        setError('Failed to load stress data');
                        setLoading(false);
                    });
            }, []);

            const getColor = (stress) => {
                if (!stress && stress !== 0) return 'rgb(40, 40, 40)';
                // Stress scale: 0-25 = relaxed (dark), 26-50 = low (warm), 51-75 = medium (orange), 76-100 = high (red)
                if (stress <= 25) return 'rgb(40, 40, 45)';
                if (stress <= 50) return `rgb(${Math.round(40 + (stress - 25) * 8.6)}, ${Math.round(40 + (stress - 25) * 3.2)}, ${Math.round(45 + (stress - 25) * 0.6)})`;
                if (stress <= 75) return `rgb(255, ${Math.round(120 - (stress - 50) * 2.4)}, ${Math.round(60 - (stress - 50) * 1.2)})`;
                return `rgb(255, ${Math.round(60 - Math.min((stress - 75), 25) * 2)}, 30)`;
            };

            const renderHeatmap = (weekData, title) => {
                if (!weekData || weekData.length === 0) {
                    return <p>No data available</p>;

                return (
                    <div style={{ marginBottom: '30px' }}>

                                                    {hour.toString().padStart(2, '0')}:00
                                                </td>

                                                    const stress = day.hours[hour];
                                                    const bg = getColor(stress);
                                                    const textColor = stress > 50 ? 'white' : (stress ? 'black' : '#666');

                                                        <td key={dayIdx}

                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        );
                                    })}

        function TestResultsAnalysis() {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                fetchResults();
            }, []);

            const fetchResults = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/lab-results`);
                    const data = await response.json();
                    if (data.error) {
                        setError(data.error);
                    } else {
                        setResults(data.results || []);
                    }
                } catch (err) {
                    setError('Failed to load lab results');
                }
                setLoading(false);
            };

            // Calculate position on range bar (0-100%)
            const getBarPosition = (value, low, high) => {
                if (!low || !high || !value) return 50;
                // Extend range by 20% on each side for display
                const range = high - low;
                const extendedLow = low - (range * 0.2);
                const extendedHigh = high + (range * 0.2);
                const position = ((value - extendedLow) / (extendedHigh - extendedLow)) * 100;
                return Math.min(100, Math.max(0, position));
            };

            // Format date
            const formatDate = (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return date.toLocaleDateString();
            };

            return (
                <div className="manager">
                    <h2>Test Results</h2>
                    <p style={{ marginBottom: '20px', opacity: 0.8 }}>
                        Latest lab values from HealthKit clinical records
                    </p>

                    {loading && <p>Loading test results...</p>}
                    {error && <p style={{ color: 'red' }}>Error: {error}</p>}

            const [heatmapData, setHeatmapData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                fetch(`${API_BASE}/sleep-heatmap`)
                    .then(res => res.json())

                            setError(data.error);
                        } else {
                            setHeatmapData(data);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        setError('Failed to load sleep data');
                        setLoading(false);
                    });
            }, []);

            const getColor = (minutes) => {
                if (!minutes || minutes === 0) return 'rgb(255, 255, 255)';
                // Max 60 minutes per hour slot - use soothing indigo/purple for sleep
                const intensity = Math.min(minutes / 60, 1);
                const r = Math.round(255 - 180 * intensity);  // 255 -> 75
                const g = Math.round(255 - 185 * intensity);  // 255 -> 70
                const b = Math.round(255 - 25 * intensity);   // 255 -> 230 (stay blue-ish)
                return `rgb(${r}, ${g}, ${b})`;
            };

            const renderHeatmap = (weekData, title) => {
                if (!weekData || weekData.length === 0) {
                    return <p>No data available</p>;
                }

                return (
                    <div style={{ marginBottom: '30px' }}>
                        <h3 style={{ marginBottom: '10px', color: 'var(--color-accent)' }}>{title}</h3>
                        <div style={{ overflowX: 'auto' }}>
                            <table style={{ borderCollapse: 'collapse', fontSize: '11px', width: '100%' }}>
                                <thead>
                                    <tr>
                                        <th style={{ padding: '4px 8px', background: '#f0f0f0', border: '1px solid #ccc' }}>Hour</th>
                                        {weekData.map((day, idx) => (
                                            <th key={idx} style={{ padding: '4px 8px', background: '#f0f0f0', border: '1px solid #ccc', minWidth: '50px' }}>
                                                {day.day_name}<br /><span style={{ fontSize: '9px', color: 'var(--color-muted)' }}>{day.date.slice(5)}</span>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {Array.from({ length: 24 }, (_, idx) => {
                                        const hour = 23 - idx;  // Start at 23, descend to 0
                                        return (
                                            <tr key={hour}>
                                                <td style={{ padding: '2px 8px', background: '#f8f8f8', border: '1px solid #ccc', fontWeight: 'bold' }}>
                                                    {hour.toString().padStart(2, '0')}:00
                                                </td>
                                                {weekData.map((day, dayIdx) => {
                                                    const minutes = day.hours[hour] || 0;
                                                    const bg = getColor(minutes);
                                                    const textColor = minutes > 40 ? 'white' : 'black';
                                                    return (
                                                        <td key={dayIdx}
                                                            style={{
                                                                backgroundColor: bg,
                                                                color: textColor,
                                                                padding: '2px 4px',
                                                                border: '1px solid #ddd',
                                                                textAlign: 'center',
                                                                cursor: 'default'
                                                            }}
                                                            title={`${day.day_name} ${day.date} @ ${hour}:00 - ${Math.round(minutes)} min`}
                                                        >
                                                            {minutes > 0 ? Math.round(minutes) : ''}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            if (loading) {
                return (
                    <div className="manager">
                        <h2>Sleep Analysis</h2>
                        <p>Loading sleep data...</p>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="manager">
                        <h2>Sleep Analysis</h2>
                        <p style={{ color: 'red' }}>Error: {error}</p>
                    </div>
                );
            }

            return (
                <div className="manager">
                    <h2>😴 Sleep Heatmap</h2>
                    <p className="timezone-info">White = Awake, Indigo = Asleep (minutes shown per hour)</p>

                    {heatmapData && heatmapData.weeks && (
                        <>
                            {heatmapData.weeks.map((week, idx) => (
                                <div key={idx}>
                                    {renderHeatmap(week.data, week.label)}

            );
