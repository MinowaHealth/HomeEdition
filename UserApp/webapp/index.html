            const [includeTrash, setIncludeTrash] = useState(false);
            const [newFolderName, setNewFolderName] = useState('');
            const [creatingFolder, setCreatingFolder] = useState(false);
            const [editingFolderId, setEditingFolderId] = useState(null);
            const [folderNameInput, setFolderNameInput] = useState('');

            // Document state
            const [documents, setDocuments] = useState([]);
            const [total, setTotal] = useState(0);
            const [selectedDoc, setSelectedDoc] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [message, setMessage] = useState('');
            const [error, setError] = useState('');
            const [editingTitle, setEditingTitle] = useState(null);
            const [titleInput, setTitleInput] = useState('');
            const [editingFilename, setEditingFilename] = useState(null);
            const [filenameInput, setFilenameInput] = useState('');
            const [movingDocId, setMovingDocId] = useState(null);

            // Annotations state
            const [annotations, setAnnotations] = useState([]);
            const [annotationBody, setAnnotationBody] = useState('');
            const [annotationPage, setAnnotationPage] = useState('');
            const [editingAnnId, setEditingAnnId] = useState(null);
            const [editingAnnBody, setEditingAnnBody] = useState('');
            const [submittingAnn, setSubmittingAnn] = useState(false);

            useEffect(() => { fetchFolders(); }, [includeTrash]);
            useEffect(() => {
                if (currentFolderId) fetchDocuments();
                else { setDocuments([]); setTotal(0); }
            }, [currentFolderId]);

            const fetchFolders = async () => {
                try {
                    const qs = includeTrash ? '?include_trash=1' : '';
                    const res = await apiFetch(`${API_BASE}/folders${qs}`);
                    if (res.ok) {
                        const data = await res.json();
                        const list = data.folders || [];
                        setFolders(list);
                        // On first load (or if current selection vanished), land on Documents system folder
                        if (!currentFolderId || !list.find(f => f.id === currentFolderId)) {
                            const docsFolder = list.find(f => f.is_system && f.name === 'Documents');
                            if (docsFolder) setCurrentFolderId(docsFolder.id);
                            else if (list.length > 0) setCurrentFolderId(list[0].id);
                        }
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to load folders');
                }
            };

            const fetchAnnotations = async (docId) => {
                try {
                    const pageSize = 200;
                    const all = [];
                    let offset = 0;
                    while (true) {
                        const res = await apiFetch(`${API_BASE}/documents/${docId}/annotations?limit=${pageSize}&offset=${offset}`);
                        if (!res.ok) return;
                        const data = await res.json();
                        const page = data.annotations || [];
                        all.push(...page);
                        const total = data.total || 0;
                        if (!page.length || offset + page.length >= total) break;
                        offset += pageSize;
                    }
                    setAnnotations(all);
                } catch (err) {
                    if (err.message !== 'Session expired') console.error('Failed to load annotations', err);
                }
            };

            const fetchDocuments = async () => {
                if (!currentFolderId) return;
                try {
                    const pageSize = 200;
                    const all = [];
                    let offset = 0;
                    let pageTotal = 0;
                    while (true) {
                        const res = await apiFetch(
                            `${API_BASE}/documents?limit=${pageSize}&offset=${offset}&folder_id=${currentFolderId}`
                        );
                        if (!res.ok) return;
                        const data = await res.json();
                        pageTotal = data.pagination?.total || 0;
                        const page = data.entries || [];
                        all.push(...page);
                        if (!data.pagination?.has_more) break;
                        offset += pageSize;
                    }
                    setDocuments(all);
                    setTotal(pageTotal);
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to load documents');
                }
            };

            const fetchDocDetail = async (docId) => {
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${docId}`);
                    if (res.ok) {
                        const data = await res.json();
                        setSelectedDoc(data);
                        fetchAnnotations(docId);
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to load document details');
                }
            };

            // ---------- Folder handlers ----------
            const handleCreateFolder = async () => {
                const name = newFolderName.trim();
                if (!name) return;
                setCreatingFolder(true);
                setError('');
                try {
                    const res = await apiFetch(`${API_BASE}/folders`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setNewFolderName('');
                        await fetchFolders();
                        setCurrentFolderId(data.id);
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to create folder');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to create folder');
                }
                setCreatingFolder(false);
            };

            const handleRenameFolder = async (folderId) => {
                const name = folderNameInput.trim();
                if (!name) { setEditingFolderId(null); return; }
                try {
                    const res = await apiFetch(`${API_BASE}/folders/${folderId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    if (res.ok) {
                        setEditingFolderId(null);
                        fetchFolders();
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to rename folder');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to rename folder');
                }
            };

            const handleTrashFolder = async (folderId) => {
                if (!confirm('Move this folder (and everything inside) to trash?')) return;
                try {
                    const res = await apiFetch(`${API_BASE}/folders/${folderId}`, { method: 'DELETE' });
                    if (res.ok) {
                        if (currentFolderId === folderId) setCurrentFolderId(null);
                        fetchFolders();
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to trash folder');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to trash folder');
                }
            };

            const handleRestoreFolder = async (folderId) => {
                try {
                    const res = await apiFetch(`${API_BASE}/folders/${folderId}/restore`, { method: 'POST' });
                    if (res.ok) {
                        fetchFolders();
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to restore folder');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to restore folder');
                }
            };

            // ---------- Document handlers ----------
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const maxSize = 5 * 1024 * 1024;
                if (file.size > maxSize) {
                    setError('File too large (max 5 MB)');
                    return;
                }
                if (!currentFolderId) {
                    setError('Select a folder first');
                    return;
                }

                setUploading(true);
                setError('');
                setMessage('Uploading...');

                const formData = new FormData();
                formData.append('file', file);
                formData.append('folder_id', currentFolderId);

                try {
                    const res = await apiFetch(`${API_BASE}/documents/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (res.ok) {
                        const data = await res.json();
                        setMessage(`Uploaded: ${data.filename}`);
                        setError('');
                        fetchDocuments();
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Upload failed');
                        setMessage('');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Upload failed: network error');
                }

                setUploading(false);
                e.target.value = '';
            };

            const handleDelete = async (docId) => {
                if (!confirm('Move this document to trash?')) return;
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${docId}`, { method: 'DELETE' });
                    if (res.ok) {
                        setMessage('Document moved to trash');
                        if (selectedDoc && selectedDoc.id === docId) setSelectedDoc(null);
                        fetchDocuments();
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Delete failed');
                }
            };

            const handleRestoreDocument = async (docId) => {
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${docId}/restore`, { method: 'POST' });
                    if (res.ok) {
                        setMessage('Document restored');
                        fetchDocuments();
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Restore failed');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Restore failed');
                }
            };

            const handleTitleSave = async (docId) => {
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${docId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: titleInput })
                    });
                    if (res.ok) {
                        setEditingTitle(null);
                        fetchDocuments();
                        if (selectedDoc && selectedDoc.id === docId) fetchDocDetail(docId);
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to update title');
                }
            };

            const handleFilenameSave = async (docId) => {
                const name = filenameInput.trim();
                if (!name) { setEditingFilename(null); return; }
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${docId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: name })
                    });
                    if (res.ok) {
                        setEditingFilename(null);
                        fetchDocuments();
                        if (selectedDoc && selectedDoc.id === docId) fetchDocDetail(docId);
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to rename');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to rename');
                }
            };

            const handleMoveDocument = async (docId, targetFolderId) => {
                if (!targetFolderId || targetFolderId === 'current') { setMovingDocId(null); return; }
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${docId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ folder_id: targetFolderId })
                    });
                    if (res.ok) {
                        setMovingDocId(null);
                        setMessage('Document moved');
                        fetchDocuments();
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Move failed');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Move failed');
                }
            };

            const handleAddAnnotation = async () => {
                if (!selectedDoc || !annotationBody.trim()) return;
                setSubmittingAnn(true);
                try {
                    const payload = { body: annotationBody.trim() };
                    if (annotationPage !== '') payload.page_number = parseInt(annotationPage, 10);
                    const res = await apiFetch(`${API_BASE}/documents/${selectedDoc.id}/annotations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        setAnnotationBody('');
                        setAnnotationPage('');
                        fetchAnnotations(selectedDoc.id);
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to add annotation');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to add annotation');
                }
                setSubmittingAnn(false);
            };

            const handleUpdateAnnotation = async (annId) => {
                if (!selectedDoc || !editingAnnBody.trim()) return;
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${selectedDoc.id}/annotations/${annId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ body: editingAnnBody.trim() })
                    });
                    if (res.ok) {
                        setEditingAnnId(null);
                        fetchAnnotations(selectedDoc.id);
                    } else {
                        const data = await res.json();
                        setError(data.error || 'Failed to update annotation');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to update annotation');
                }
            };

            const handleDeleteAnnotation = async (annId) => {
                if (!selectedDoc || !confirm('Delete this annotation?')) return;
                try {
                    const res = await apiFetch(`${API_BASE}/documents/${selectedDoc.id}/annotations/${annId}`, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        fetchAnnotations(selectedDoc.id);
                    } else {
                        setError('Failed to delete annotation');
                    }
                } catch (err) {
                    if (err.message !== 'Session expired') setError('Failed to delete annotation');
                }
            };

            const timeAgo = (iso) => {
                if (!iso) return '';
                const diff = Date.now() - new Date(iso).getTime();
                const mins = Math.floor(diff / 60000);
                if (mins < 1) return 'just now';
                if (mins < 60) return `${mins}m ago`;
                const hrs = Math.floor(mins / 60);
                if (hrs < 24) return `${hrs}h ago`;
                const days = Math.floor(hrs / 24);
                if (days < 7) return `${days}d ago`;
                return formatDate(iso);
            };

            const formatSize = (bytes) => {
                if (!bytes) return '-';
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };

            const formatDate = (iso) => {
                if (!iso) return '-';
                const d = new Date(iso);
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            };

            const qualityBadge = (label) => {
                const colors = { green: '#22c55e', yellow: '#eab308', red: '#ef4444', unknown: '#94a3b8' };
                const bg = colors[label] || colors.unknown;
                return <span style={{
                    display: 'inline-block', padding: '2px 8px', borderRadius: '4px',
                    fontSize: '11px', fontWeight: 600, color: '#fff', background: bg
                }}>{label || 'unknown'}</span>;
            };

            const currentFolder = folders.find(f => f.id === currentFolderId);
            const liveFolders = folders.filter(f => !f.deleted_at);
            const systemFolders = liveFolders.filter(f => f.is_system)
                .sort((a, b) => a.name.localeCompare(b.name));
            const userFolders = liveFolders.filter(f => !f.is_system)
                .sort((a, b) => a.name.localeCompare(b.name));
            const trashedFolders = folders.filter(f => f.deleted_at)
                .sort((a, b) => (b.deleted_at || '').localeCompare(a.deleted_at || ''));

            const renderFolderRow = (folder) => {
                const isCurrent = folder.id === currentFolderId;
                const isTrashed = !!folder.deleted_at;
                return (
                    <div key={folder.id}
                        onClick={() => !isTrashed && setCurrentFolderId(folder.id)}
                        style={{
                            display: 'flex', alignItems: 'center', gap: '6px',
                            padding: '6px 10px', borderRadius: '4px', marginBottom: '2px',
                            cursor: isTrashed ? 'default' : 'pointer',
                            background: isCurrent ? 'rgba(102,126,234,0.2)' : 'transparent',
                            opacity: isTrashed ? 0.55 : 1,
                            fontSize: '13px'
                        }}>
                        <span style={{ fontSize: '14px' }}>
                            {folder.is_system ? (folder.name === 'Fax' ? '📠' : '📁') : '📂'}
                        </span>
                        {editingFolderId === folder.id ? (
                            <input value={folderNameInput}
                                onClick={e => e.stopPropagation()}
                                onChange={e => setFolderNameInput(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter') handleRenameFolder(folder.id);
                                    if (e.key === 'Escape') setEditingFolderId(null);
                                }}
                                onBlur={() => handleRenameFolder(folder.id)}
                                autoFocus
                                style={{
                                    flex: 1, padding: '2px 6px', fontSize: '13px',
                                    background: 'var(--input-bg, #161622)',
                                    border: '1px solid var(--accent, #667eea)',
                                    color: 'var(--text, #e0e0e0)', borderRadius: '3px'
                                }} />
                        ) : (
                            <span style={{
                                flex: 1, fontWeight: isCurrent ? 600 : 400,
                                color: isCurrent ? 'var(--text, #e0e0e0)' : 'var(--text-secondary, #aaa)'
                            }}>{folder.name}</span>
                        )}
                        {!isTrashed && !folder.is_system && editingFolderId !== folder.id && (
                            <span onClick={e => e.stopPropagation()} style={{ display: 'flex', gap: '2px' }}>
                                <button title="Rename"
                                    onClick={() => { setEditingFolderId(folder.id); setFolderNameInput(folder.name); }}
                                    style={{ background: 'none', border: 'none', color: 'var(--text-secondary, #aaa)', cursor: 'pointer', padding: '2px 4px', fontSize: '11px' }}>✎</button>
                                <button title="Trash"
                                    onClick={() => handleTrashFolder(folder.id)}
                                    style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', padding: '2px 4px', fontSize: '11px' }}>🗑</button>
                            </span>
                        )}
                        {isTrashed && (
                            <button onClick={e => { e.stopPropagation(); handleRestoreFolder(folder.id); }}
                                style={{ background: 'none', border: '1px solid var(--border, #444)', color: 'var(--text-secondary, #aaa)', cursor: 'pointer', padding: '1px 6px', fontSize: '10px', borderRadius: '3px' }}>
                                restore
                            </button>
                        )}
                    </div>
                );
            };

            return (
                <div style={{ padding: '24px', display: 'flex', gap: '20px', minHeight: '500px' }}>
                    {/* Folder sidebar */}
                    <div style={{
                        width: '240px', flexShrink: 0,
                        border: '1px solid var(--border, #444)', borderRadius: '8px',
                        padding: '12px', background: 'var(--card-bg, #1e1e2e)',
                        alignSelf: 'flex-start', position: 'sticky', top: '20px',
                        maxHeight: 'calc(100vh - 40px)', overflowY: 'auto'
                    }}>
                        <div style={{ fontSize: '11px', fontWeight: 600, textTransform: 'uppercase', color: 'var(--text-secondary, #888)', margin: '4px 0 8px' }}>
                            System
                        </div>
                        {systemFolders.map(renderFolderRow)}

                        <div style={{ fontSize: '11px', fontWeight: 600, textTransform: 'uppercase', color: 'var(--text-secondary, #888)', margin: '12px 0 8px' }}>
                            My Folders
                        </div>
                        {userFolders.map(renderFolderRow)}
                        {userFolders.length === 0 && (
                            <div style={{ fontSize: '12px', color: 'var(--text-secondary, #666)', padding: '4px 10px' }}>
                                (none yet)
                            </div>
                        )}

                        {/* Create folder */}
                        <div style={{ marginTop: '12px', display: 'flex', gap: '4px' }}>
                            <input value={newFolderName}
                                onChange={e => setNewFolderName(e.target.value)}
                                onKeyDown={e => { if (e.key === 'Enter') handleCreateFolder(); }}
                                placeholder="New folder..."
                                disabled={creatingFolder}
                                style={{
                                    flex: 1, padding: '4px 8px', fontSize: '12px',
                                    background: 'var(--input-bg, #161622)',
                                    border: '1px solid var(--border, #444)',
                                    color: 'var(--text, #e0e0e0)', borderRadius: '4px'
                                }} />
                            <button onClick={handleCreateFolder}
                                disabled={creatingFolder || !newFolderName.trim()}
                                style={{
                                    padding: '4px 10px', fontSize: '12px',
                                    background: creatingFolder || !newFolderName.trim() ? 'var(--border, #444)' : 'var(--accent, #667eea)',
                                    color: '#fff', border: 'none', borderRadius: '4px',
                                    cursor: creatingFolder || !newFolderName.trim() ? 'default' : 'pointer'
                                }}>+</button>
                        </div>

                        {/* Trash toggle */}
                        <div style={{ marginTop: '16px', borderTop: '1px solid var(--border, #333)', paddingTop: '10px' }}>
                            <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px', color: 'var(--text-secondary, #aaa)', cursor: 'pointer' }}>
                                <input type="checkbox" checked={includeTrash}
                                    onChange={e => setIncludeTrash(e.target.checked)} />
                                Show trashed
                            </label>
                            {includeTrash && trashedFolders.length > 0 && (
                                <div style={{ marginTop: '8px' }}>
                                    <div style={{ fontSize: '10px', fontWeight: 600, textTransform: 'uppercase', color: 'var(--text-secondary, #666)', marginBottom: '4px' }}>
                                        Trashed folders
                                    </div>
                                    {trashedFolders.map(renderFolderRow)}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Main content */}
                    <div style={{ flex: 1, minWidth: 0, maxWidth: '900px' }}>
                    <h2 style={{ marginBottom: '4px' }}>
                        {currentFolder ? currentFolder.name : 'Documents'}
                    </h2>
                    <div style={{ fontSize: '12px', color: 'var(--text-secondary, #888)', marginBottom: '16px' }}>
                        {currentFolder?.is_system ? 'System folder — cannot be renamed or trashed' : currentFolder ? 'User folder' : 'Select a folder'}
                    </div>

                    {/* Upload area */}
                    <div style={{
                        border: '2px dashed var(--border, #444)',
                        borderRadius: '8px', padding: '24px', textAlign: 'center',
                        marginBottom: '20px', background: 'var(--card-bg, #1e1e2e)'
                    }}>
                        <p style={{ marginBottom: '12px', color: 'var(--text-secondary, #aaa)' }}>
                            Upload to <strong>{currentFolder ? currentFolder.name : '...'}</strong> (PDF, image, or text file, max 5 MB)
                        </p>
                        <label style={{
                            display: 'inline-block', padding: '10px 24px',
                            background: 'var(--accent, #667eea)', color: '#fff',
                            borderRadius: '6px', cursor: uploading || !currentFolderId ? 'wait' : 'pointer',
                            fontWeight: 500, opacity: uploading || !currentFolderId ? 0.6 : 1
                        }}>
                            {uploading ? 'Uploading...' : 'Choose File'}
                            <input type="file" style={{ display: 'none' }}
                                accept=".pdf,.png,.jpg,.jpeg,.tiff,.tif,.txt"
                                onChange={handleUpload} disabled={uploading || !currentFolderId} />
                        </label>
                    </div>

                    {/* Status messages */}
                    {message && <div style={{
                        padding: '10px 16px', marginBottom: '12px', borderRadius: '6px',
                        background: 'rgba(34,197,94,0.15)', color: '#22c55e'
                    }}>{message}</div>}
                    {error && <div style={{
                        padding: '10px 16px', marginBottom: '12px', borderRadius: '6px',
                        background: 'rgba(239,68,68,0.15)', color: '#ef4444'
                    }}>{error}</div>}

                    {/* Document detail panel */}
                    {selectedDoc && (
                        <div style={{
                            border: '1px solid var(--border, #444)', borderRadius: '8px',
                            padding: '20px', marginBottom: '20px', background: 'var(--card-bg, #1e1e2e)'
                        }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                <h3>{selectedDoc.title || selectedDoc.filename}</h3>
                                <button onClick={() => { setSelectedDoc(null); setAnnotations([]); }}
                                    style={{ background: 'none', border: 'none', color: 'var(--text-secondary, #aaa)', cursor: 'pointer', fontSize: '18px' }}>
                                    &times;
                                </button>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', fontSize: '13px', color: 'var(--text-secondary, #aaa)' }}>
                                <div>Type: {selectedDoc.mime_type}</div>
                                <div>Size: {formatSize(selectedDoc.file_size_bytes)}</div>
                                <div>Source: {selectedDoc.source}</div>
                                <div>Quality: {qualityBadge(selectedDoc.quality_label)}</div>
                                <div>OCR: {selectedDoc.ocr_status}</div>
                                <div>Pages: {selectedDoc.page_count || '-'}</div>
                                <div>Uploaded: {formatDate(selectedDoc.created_at)}</div>
                                <div>Category: {selectedDoc.category || '-'}</div>
                            </div>
                            {selectedDoc.sha256 && (
                                <div style={{
                                    marginTop: '8px', fontSize: '12px',
                                    color: 'var(--text-secondary, #aaa)',
                                    display: 'flex', alignItems: 'center', gap: '6px'
                                }}>
                                    <span>Fingerprint:</span>
                                    <code title={selectedDoc.sha256}
                                        onClick={() => navigator.clipboard?.writeText(selectedDoc.sha256)}
                                        style={{
                                            fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
                                            fontSize: '11px', padding: '1px 6px', borderRadius: '3px',
                                            background: 'var(--input-bg, #161622)',
                                            border: '1px solid var(--border, #333)',
                                            cursor: 'pointer'
                                        }}>
                                        {selectedDoc.sha256.slice(0, 12)}…{selectedDoc.sha256.slice(-4)}
                                    </code>
                                    <span style={{ fontSize: '10px', color: 'var(--text-secondary, #666)' }}>
                                        (sha256 — click to copy)
                                    </span>
                                </div>
                            )}
                            <div style={{ marginTop: '16px', display: 'flex', gap: '8px' }}>
                                <a href={`${API_BASE}/documents/${selectedDoc.id}/download`}
                                    style={{
                                        padding: '6px 16px', borderRadius: '4px',
                                        background: 'var(--accent, #667eea)', color: '#fff',
                                        textDecoration: 'none', fontSize: '13px', fontWeight: 500
                                    }}>Download</a>
                            </div>
                            {selectedDoc.pages && selectedDoc.pages.length > 0 && (
                                <div style={{ marginTop: '16px', textAlign: 'center' }}>
                                    <a href={`${API_BASE}/documents/${selectedDoc.id}/pages/1/image`}
                                        target="_blank" rel="noopener noreferrer"
                                        title="Open full-size page 1 in a new tab">
                                        <img src={`${API_BASE}/documents/${selectedDoc.id}/pages/1/image`}
                                            alt={`Page 1 of ${selectedDoc.filename}`}
                                            onError={e => { e.target.style.display = 'none'; }}
                                            style={{
                                                maxWidth: '100%', maxHeight: '400px',
                                                border: '1px solid var(--border, #444)',
                                                borderRadius: '4px',
                                                background: '#fff'
                                            }} />
                                    </a>
                                </div>
                            )}
                            {(selectedDoc.ocr_text_full && selectedDoc.ocr_text_full.trim()) && (
                                <div style={{ marginTop: '16px' }}>
                                    <h4 style={{ marginBottom: '8px' }}>Extracted text</h4>
                                    <pre style={{
                                        margin: 0, padding: '12px',
                                        maxHeight: '300px', overflowY: 'auto',
                                        fontSize: '12px', lineHeight: '1.45',
                                        whiteSpace: 'pre-wrap', wordBreak: 'break-word',
                                        background: 'var(--input-bg, #161622)',
                                        border: '1px solid var(--border, #333)',
                                        borderRadius: '6px',
                                        color: 'var(--text, #e0e0e0)',
                                        fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace'
                                    }}>{selectedDoc.ocr_text_full}</pre>
                                </div>
                            )}
                            {selectedDoc.pages && selectedDoc.pages.length > 0 && (
                                <div style={{ marginTop: '16px' }}>
                                    <h4 style={{ marginBottom: '8px' }}>Pages</h4>
                                    {selectedDoc.pages.map(p => (
                                        <div key={p.id} style={{
                                            padding: '6px 12px', fontSize: '12px',
                                            borderBottom: '1px solid var(--border, #333)'
                                        }}>
                                            Page {p.page_number}: {qualityBadge(p.quality_label)}
                                            {p.ocr_confidence != null && ` (${(p.ocr_confidence * 100).toFixed(0)}%)`}
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Annotations section */}
                            <div style={{ marginTop: '20px', borderTop: '1px solid var(--border, #444)', paddingTop: '16px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' }}>
                                    <h4 style={{ margin: 0 }}>Annotations</h4>
                                    <span style={{
                                        display: 'inline-block', padding: '1px 8px', borderRadius: '10px',
                                        fontSize: '11px', fontWeight: 600, background: 'var(--border, #444)',
                                        color: 'var(--text-secondary, #aaa)'
                                    }}>{annotations.length}</span>
                                </div>

                                {/* Add annotation form */}
                                <div style={{ marginBottom: '16px' }}>
                                    <textarea
                                        value={annotationBody}
                                        onChange={e => setAnnotationBody(e.target.value)}
                                        placeholder="Add a note..."
                                        rows={2}
                                        style={{
                                            width: '100%', padding: '8px 10px', fontSize: '13px',
                                            borderRadius: '6px', border: '1px solid var(--border, #444)',
                                            background: 'var(--input-bg, #161622)', color: 'var(--text, #e0e0e0)',
                                            resize: 'vertical', fontFamily: 'inherit', boxSizing: 'border-box'
                                        }}
                                    />
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '6px' }}>
                                        {selectedDoc.pages && selectedDoc.pages.length > 0 && (
                                            <select
                                                value={annotationPage}
                                                onChange={e => setAnnotationPage(e.target.value)}
                                                style={{
                                                    padding: '4px 8px', fontSize: '12px', borderRadius: '4px',
                                                    border: '1px solid var(--border, #444)',
                                                    background: 'var(--input-bg, #161622)', color: 'var(--text, #e0e0e0)'
                                                }}
                                            >
                                                <option value="">Document-level</option>
                                                {selectedDoc.pages.map(p => (
                                                    <option key={p.page_number} value={p.page_number}>
                                                        Page {p.page_number}
                                                    </option>
                                                ))}
                                            </select>
                                        )}
                                        <button
                                            onClick={handleAddAnnotation}
                                            disabled={submittingAnn || !annotationBody.trim()}
                                            style={{
                                                padding: '5px 14px', fontSize: '12px', fontWeight: 500,
                                                borderRadius: '4px', border: 'none', cursor: 'pointer',
                                                background: submittingAnn || !annotationBody.trim()
                                                    ? 'var(--border, #444)' : 'var(--accent, #667eea)',
                                                color: '#fff', opacity: submittingAnn ? 0.6 : 1
                                            }}
                                        >
                                            {submittingAnn ? 'Adding...' : 'Add Note'}
                                        </button>
                                    </div>
                                </div>

                                {/* Annotation list */}
                                {annotations.length === 0 && (
                                    <div style={{ fontSize: '12px', color: 'var(--text-secondary, #888)', textAlign: 'center', padding: '12px 0' }}>
                                        No annotations yet.
                                    </div>
                                )}
                                {annotations.map(ann => (
                                    <div key={ann.id} style={{
                                        padding: '10px 12px', marginBottom: '6px', borderRadius: '6px',
                                        background: 'var(--input-bg, #161622)',
                                        border: '1px solid var(--border, #333)'
                                    }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                                            <div style={{ fontSize: '12px', color: 'var(--text-secondary, #aaa)' }}>
                                                <span style={{ fontWeight: 600, color: 'var(--text, #e0e0e0)' }}>
                                                    {ann.author_name || 'Unknown'}
                                                </span>
                                                <span style={{
                                                    display: 'inline-block', padding: '0 5px', marginLeft: '6px',
                                                    borderRadius: '3px', fontSize: '10px', fontWeight: 600,
                                                    background: ann.author_type === 'provider' ? 'rgba(102,126,234,0.25)' :
                                                        ann.author_type === 'delegate' ? 'rgba(234,179,8,0.25)' : 'rgba(148,163,184,0.2)',
                                                    color: ann.author_type === 'provider' ? '#667eea' :
                                                        ann.author_type === 'delegate' ? '#eab308' : 'var(--text-secondary, #aaa)'
                                                }}>{ann.author_type}</span>
                                                {ann.page_number != null && (
                                                    <span style={{ marginLeft: '8px', fontSize: '11px' }}>
                                                        p.{ann.page_number}
                                                    </span>
                                                )}
                                                <span style={{ marginLeft: '8px' }}>{timeAgo(ann.created_at)}</span>
                                                {ann.updated_at && ann.updated_at !== ann.created_at && (
                                                    <span style={{ marginLeft: '4px', fontStyle: 'italic' }}>(edited)</span>
                                                )}
                                            </div>
                                            <button
                                                onClick={() => handleDeleteAnnotation(ann.id)}
                                                style={{
                                                    background: 'none', border: 'none', color: '#ef4444',
                                                    cursor: 'pointer', fontSize: '11px', padding: '2px 6px'
                                                }}
                                            >Delete</button>
                                        </div>
                                        {editingAnnId === ann.id ? (
                                            <div>
                                                <textarea
                                                    value={editingAnnBody}
                                                    onChange={e => setEditingAnnBody(e.target.value)}
                                                    rows={2}
                                                    style={{
                                                        width: '100%', padding: '6px 8px', fontSize: '13px',
                                                        borderRadius: '4px', border: '1px solid var(--border, #444)',
                                                        background: 'var(--card-bg, #1e1e2e)', color: 'var(--text, #e0e0e0)',
                                                        resize: 'vertical', fontFamily: 'inherit', boxSizing: 'border-box'
                                                    }}
                                                    autoFocus
                                                />
                                                <div style={{ display: 'flex', gap: '6px', marginTop: '4px' }}>
                                                    <button onClick={() => handleUpdateAnnotation(ann.id)}
                                                        style={{
                                                            padding: '3px 10px', fontSize: '11px', borderRadius: '3px',
                                                            border: 'none', background: 'var(--accent, #667eea)',
                                                            color: '#fff', cursor: 'pointer'
                                                        }}>Save</button>
                                                    <button onClick={() => setEditingAnnId(null)}
                                                        style={{
                                                            padding: '3px 10px', fontSize: '11px', borderRadius: '3px',
                                                            border: '1px solid var(--border, #444)', background: 'none',
                                                            color: 'var(--text-secondary, #aaa)', cursor: 'pointer'
                                                        }}>Cancel</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div
                                                onDoubleClick={() => { setEditingAnnId(ann.id); setEditingAnnBody(ann.body); }}
                                                title="Double-click to edit"
                                                style={{ fontSize: '13px', whiteSpace: 'pre-wrap', cursor: 'default', lineHeight: '1.4' }}
                                            >{ann.body}</div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Document list */}
                    <div style={{ fontSize: '13px', color: 'var(--text-secondary, #aaa)', marginBottom: '8px' }}>
                        {total} document{total !== 1 ? 's' : ''} in this folder
                    </div>
                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                        <thead>
                            <tr style={{ borderBottom: '1px solid var(--border, #444)', textAlign: 'left' }}>
                                <th style={{ padding: '8px 4px' }}>Filename</th>
                                <th style={{ padding: '8px 4px' }}>Type</th>
                                <th style={{ padding: '8px 4px' }}>Size</th>
                                <th style={{ padding: '8px 4px' }}>Quality</th>
                                <th style={{ padding: '8px 4px' }}>Uploaded</th>
                                <th style={{ padding: '8px 4px' }}>Move</th>
                                <th style={{ padding: '8px 4px' }}></th>
                            </tr>
                        </thead>
                        <tbody>
                            {documents.map(doc => {
                                const isTrashed = !!doc.deleted_at;
                                return (
                                <tr key={doc.id} style={{
                                    borderBottom: '1px solid var(--border, #333)',
                                    cursor: 'pointer',
                                    opacity: isTrashed ? 0.55 : 1
                                }}
                                    onClick={() => fetchDocDetail(doc.id)}>
                                    <td style={{ padding: '8px 4px' }}>
                                        {editingFilename === doc.id ? (
                                            <span onClick={e => e.stopPropagation()}>
                                                <input value={filenameInput}
                                                    onChange={e => setFilenameInput(e.target.value)}
                                                    onKeyDown={e => { if (e.key === 'Enter') handleFilenameSave(doc.id); if (e.key === 'Escape') setEditingFilename(null); }}
                                                    onBlur={() => handleFilenameSave(doc.id)}
                                                    style={{ padding: '2px 6px', fontSize: '13px', width: '240px' }}
                                                    autoFocus />
                                            </span>
                                        ) : (
                                            <span onDoubleClick={(e) => { e.stopPropagation(); setEditingFilename(doc.id); setFilenameInput(doc.filename); }}
                                                title="Double-click to rename file">
                                                {doc.filename}
                                                {doc.title && doc.title !== doc.filename && (
                                                    <span style={{ color: 'var(--text-secondary, #888)', fontSize: '11px', marginLeft: '6px' }}>
                                                        — {doc.title}
                                                    </span>
                                                )}
                                            </span>
                                        )}
                                    </td>
                                    <td style={{ padding: '8px 4px' }}>{(doc.mime_type || '').split('/').pop()}</td>
                                    <td style={{ padding: '8px 4px' }}>{formatSize(doc.file_size_bytes)}</td>
                                    <td style={{ padding: '8px 4px' }}>{qualityBadge(doc.quality_label)}</td>
                                    <td style={{ padding: '8px 4px' }}>{formatDate(doc.created_at)}</td>
                                    <td style={{ padding: '8px 4px' }} onClick={e => e.stopPropagation()}>
                                        <select value="current"
                                            onChange={e => handleMoveDocument(doc.id, e.target.value)}
                                            disabled={isTrashed}
                                            style={{
                                                padding: '3px 4px', fontSize: '11px',
                                                background: 'var(--input-bg, #161622)',
                                                border: '1px solid var(--border, #444)',
                                                color: 'var(--text, #e0e0e0)', borderRadius: '3px',
                                                maxWidth: '120px'
                                            }}>
                                            <option value="current">— move —</option>
                                            {liveFolders.filter(f => f.id !== currentFolderId).map(f => (
                                                <option key={f.id} value={f.id}>{f.name}</option>
                                            ))}
                                        </select>
                                    </td>
                                    <td style={{ padding: '8px 4px' }}>
                                        {isTrashed ? (
                                            <button onClick={(e) => { e.stopPropagation(); handleRestoreDocument(doc.id); }}
                                                style={{
                                                    background: 'none', border: '1px solid var(--border, #444)',
                                                    color: 'var(--text-secondary, #aaa)', cursor: 'pointer',
                                                    fontSize: '11px', padding: '2px 8px', borderRadius: '3px'
                                                }}>Restore</button>
                                        ) : (
                                            <button onClick={(e) => { e.stopPropagation(); handleDelete(doc.id); }}
                                                style={{
                                                    background: 'none', border: 'none',
                                                    color: '#ef4444', cursor: 'pointer', fontSize: '12px'
                                                }}>Trash</button>
                                        )}
                                    </td>
                                </tr>
                                );
                            })}
                            {documents.length === 0 && (
                                <tr>
                                    <td colSpan="7" style={{ padding: '24px', textAlign: 'center', color: 'var(--text-secondary, #888)' }}>
                                        {currentFolderId ? 'No documents in this folder yet.' : 'Select a folder.'}
                                    </td>
                                </tr>
                            )}
                        </tbody>
                    </table>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    <!-- Feedback widget — floating button + modal, posts to /api/v1/feedback -->
    <script src="/shared/feedback-widget.js"
            data-endpoint="/api/v1/feedback"
            data-auth-header="Cookie"></script>
</body>

</html>
